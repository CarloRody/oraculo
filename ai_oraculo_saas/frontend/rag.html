<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - RAG Search</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-box { background: #1e293b; border-radius: 12px; padding: 2rem; border: 1px solid #334155; margin-bottom: 2rem; }
        .search-input-group { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .search-input-group input[type="text"] { flex: 1 1 200px; }
        .search-input-group .btn-primary { flex-shrink: 0; }

        .result-item { background: #1e293b; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; border-left: 4px solid #60a5fa; }
        .result-doc { color: #60a5fa; font-size: 0.85rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
        .result-text { color: #e2e8f0; line-height: 1.7; font-size: 0.95rem; }
        .similarity-tag { color: #a78bfa; font-weight: 600; }

        .loading { text-align: center; padding: 2rem; color: #64748b; display: none; }
    </style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Voltar ao Portal</a>

<div class="header">
    <h1>&#128269; RAG Search</h1>
    <p>Busca semântica nos documentos indexados por área temática</p>
</div>

<!-- Tabs -->
<div class="tabs">
    <div class="tab active" data-tab="search" onclick="showTab('search', this)">&#128269; Busca</div>
    <div class="tab" data-tab="advanced" onclick="showTab('advanced', this)">&#9881; Avançado</div>
</div>

<!-- Content Area -->
<div class="content-area">

    <!-- Tab: Search -->
    <form id="searchForm">
        <h3 style="color: #60a5fa; margin-bottom: 1.5rem;">Pesquisar nos documentos indexados</h3>

        <div class="search-box">
            <label for="areaSelect">Área temática:</label>
            <select id="areaSelect" required>
                <option value="">Selecione uma área...</option>
            </select>

            <div class="search-input-group">
                <input type="text" id="queryInput" placeholder="O que você deseja pesquisar?" required />
                <button type="submit" class="btn-primary">&#128640; Pesquisar</button>
            </div>
        </div>
    </form>

    <!-- Tab: Advanced -->
    <form id="advancedForm" style="display:none">
        <h3 style="color: #60a5fa; margin-bottom: 1.5rem;">Pesquisa avançada</h3>

        <div class="search-box">
            <div class="form-group">
                <label for="areaSelectAdvanced">Área temática:</label>
                <select id="areaSelectAdvanced" required>
                    <option value="">Selecione uma área...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="advancedQuery">Pergunta:</label>
                <input type="text" id="advancedQuery" placeholder="Sua pergunta aqui..." required />
            </div>

            <div class="form-group">
                <label for="topK">Número de resultados (k):</label>
                <input type="number" id="topK" value="8" min="1" max="20" />
            </div>

            <button type="submit" class="btn-primary">&#128640; Pesquisar Avançada</button>
        </div>
    </form>

</div>

<!-- Results -->
<div class="content-area">
    <h3 style="color: #a78bfa; margin-bottom: 0.75rem;">Resultados da pesquisa</h3>
    <div id="resultsArea"><p class="empty-text">Faça uma pesquisa acima para ver resultados.</p></div>
</div>

<!-- Loading indicator -->
<div class="loading" id="loading">Carregando resultados...</div>

<script>
const API = window.location.protocol + '//' + window.location.host;
let areasCache = [];

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

async function loadAreas() {
    try {
        const res = await fetch(`${API}/api/areas`);
        const data = await res.json();
        areasCache = data.areas || [];
        const optionsHtml = '<option value="">Selecione uma área...</option>' +
            areasCache.map(a => `<option value="${a.id}">${esc(a.name)}</option>`).join('');
        document.getElementById('areaSelect').innerHTML = optionsHtml;
        document.getElementById('areaSelectAdvanced').innerHTML = optionsHtml;
    } catch (err) {
        console.error('Erro ao carregar áreas:', err);
        document.getElementById('resultsArea').innerHTML = '<p class="banner-error">Não foi possível conectar à API.</p>';
    }
}

function showTab(tabType, el) {
    document.getElementById('searchForm').style.display = tabType === 'search' ? 'block' : 'none';
    document.getElementById('advancedForm').style.display = tabType === 'advanced' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
}

document.getElementById('searchForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const query = document.getElementById('queryInput').value;
    const areaId = document.getElementById('areaSelect').value;
    if (!areaId || !query) { alert('Selecione uma área e faça uma pesquisa.'); return; }
    performSearch(query, areaId);
});

document.getElementById('advancedForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const query = document.getElementById('advancedQuery').value;
    const areaId = document.getElementById('areaSelectAdvanced').value;
    const topK = parseInt(document.getElementById('topK').value) || 8;
    if (!areaId || !query) { alert('Selecione uma área e faça uma pesquisa.'); return; }
    performSearch(query, areaId, topK);
});

async function performSearch(query, areaId, topK) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultsArea').innerHTML = '';

    try {
        const body = { query, area_id: parseInt(areaId) };
        if (topK) body.top_k = topK;

        const res = await fetch(`${API}/api/search`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';

        if (data.error) {
            document.getElementById('resultsArea').innerHTML = `<p class="banner-error">Erro: ${esc(data.error)}</p>`;
            return;
        }

        const results = data.results || [];
        if (results.length === 0) {
            document.getElementById('resultsArea').innerHTML = '<p class="empty-text">Nenhum resultado encontrado.</p>';
            return;
        }

        const areaName = areasCache.find(a => a.id == areaId)?.name || 'Área';
        let html = `<div style="color: #a78bfa; margin-bottom: 1rem;">${results.length} resultado(s) para "${esc(query)}" na área de ${esc(areaName)}:</div>`;
        html += results.map(r => `
            <div class="result-item">
                <div class="result-doc">
                    <span>${esc(r.doc_name || 'Documento')} • Doc #${r.doc_id}</span>
                    <span class="similarity-tag">${Math.round((r.similarity || 0) * 100)}% relevante</span>
                </div>
                <div class="result-text">${esc((r.content_chunk || '').substring(0, 500))}</div>
            </div>`).join('');
        document.getElementById('resultsArea').innerHTML = html;
    } catch (err) {
        console.error(err);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultsArea').innerHTML = '<p class="banner-error">Erro ao conectar com a API.</p>';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    loadAreas();
});
</script>

</body>
</html>
