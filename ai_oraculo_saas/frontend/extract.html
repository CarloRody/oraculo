<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="access-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo - Extrair Dados</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .doc-list { margin-top: 1.5rem; }
        .doc-item { background: #1e293b; border-radius: 8px; padding: 1rem; margin-bottom: 0.85rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; border: 1px solid #334155; }
        .doc-info { color: #e2e8f0; font-size: 0.95rem; }
        .doc-meta { color: #64748b; font-size: 0.8rem; margin-top: 0.35rem; display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">&larr; Voltar ao Portal</a>

    <div class="header">
        <h1>&#128193; Extrair Dados</h1>
        <p>Importe documentos para sua base de conhecimento</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="link" onclick="showTab('link', this)">&#127760; Link Externo</div>
        <div class="tab" data-tab="file" onclick="showTab('file', this)">&#128193; Arquivo Local</div>
    </div>

    <!-- Content Area -->
    <div class="content-area">

        <!-- Tab: Link Externo -->
        <form id="linkForm">
            <h3 style="color: #60a5fa; margin-bottom: 1.5rem;">Incorporar documento via link externo</h3>
            <div class="form-group">
                <label for="areaId">Área temática:</label>
                <select id="areaId" required>
                    <option value="">Selecione uma área...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="linkUrl">URL do documento:</label>
                <input type="text" id="linkUrl" placeholder="https://exemplo.com/docs/tecnologia.html" required>
            </div>

            <div class="form-group">
                <label for="linkName">Nome do documento <span style="font-weight:normal; color:#64748b;">(opcional — se vazio, usa o domínio da URL)</span>:</label>
                <input type="text" id="linkName" placeholder="Ex: Manual de Contingência NF-e">
            </div>

            <div class="form-group">
                <label for="linkFetchMode">Tipo de extração:</label>
                <select id="linkFetchMode">
                    <option value="http">HTTP simples (padrão — rápido, não roda JavaScript)</option>
                    <option value="js_browser">Navegador com JS (para páginas SPA/ASP.NET que só carregam conteúdo via JavaScript)</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">&#128640; Incorporar Documento</button>
        </form>

        <!-- Tab: Arquivo Local -->
        <form id="fileForm" style="display:none">
            <h3 style="color: #60a5fa; margin-bottom: 1.5rem;">Incorporar documento do computador</h3>
            <div class="form-group">
                <label for="areaIdFile">Área temática:</label>
                <select id="areaIdFile" required>
                    <option value="">Selecione uma área...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fileInput">Arquivo (PDF ou TXT):</label>
                <input type="file" id="fileInput" accept=".pdf,.txt">
            </div>

            <button type="submit" class="btn-primary">&#128640; Incorporar Documento</button>
        </form>

    </div>

    <!-- Document List -->
    <div class="content-area">
        <h3 style="color: #a78bfa; margin-bottom: 0.5rem;">Documentos incorporados <span style="color:#64748b; font-weight:normal; font-size:0.85rem;">(10 mais recentes)</span></h3>
        <div class="doc-list" id="doc-list"><p class="loading-text">Carregando...</p></div>
    </div>

    <div class="footer">Oráculo</div>

<script>
const API = window.location.protocol + '//' + window.location.host;
let documents = [];

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function statusBadge(status) {
    const s = status || 'pending';
    const labels = { pending: 'pendente', processing: 'processando', indexed: 'indexado', failed: 'falhou' };
    return `<span class="status-badge status-${s}">${labels[s] || s}</span>`;
}

async function loadAreas() {
    try {
        const res = await fetch(`${API}/admin/areas`);
        const data = await res.json();
        if (!data.areas) return;
        const optionsHtml = '<option value="">Selecione uma área...</option>' +
            data.areas.filter(a => a.status === 'active').map(a => `<option value="${a.id}">${esc(a.name)}</option>`).join('');
        document.getElementById('areaId').innerHTML = optionsHtml;
        document.getElementById('areaIdFile').innerHTML = optionsHtml;
    } catch (err) {
        console.error('Erro ao carregar áreas:', err);
        document.getElementById('doc-list').innerHTML = '<p class="banner-error">Não foi possível conectar à API. Verifique se o servidor está rodando.</p>';
    }
}

async function loadDocuments() {
    try {
        const res = await fetch(`${API}/api/documents?limit=10`);
        const data = await res.json();
        documents = data.documents || [];
        renderDocuments();
    } catch (err) {
        console.error('Erro ao carregar documentos:', err);
        document.getElementById('doc-list').innerHTML = '<p class="banner-error">Erro ao carregar documentos.</p>';
    }
}

function fetchModeLabel(mode) {
    return mode === 'js_browser'
        ? '<span style="color:#a78bfa;">Navegador com JS</span>'
        : '<span>HTTP simples</span>';
}

function renderDocuments() {
    const listEl = document.getElementById('doc-list');
    if (documents.length === 0) {
        listEl.innerHTML = '<p class="empty-text">Nenhum documento incorporado ainda.</p>';
        return;
    }

    listEl.innerHTML = documents.map(doc => {
        const icon = doc.type === 'link' ? '&#127760;' : '&#128193;';
        return `
            <div class="doc-item">
                <div>
                    <span class="doc-info">${icon} ${esc(doc.name)}</span>
                    <div class="doc-meta">
                        <span>${doc.type === 'link' ? 'Link externo' : 'Arquivo local'} • ID: ${doc.id}</span>
                        ${doc.type === 'link' ? `<span>• ${fetchModeLabel(doc.fetch_mode)}</span>` : ''}
                        ${statusBadge(doc.processing_status)}
                        <span>${doc.chunk_count || 0} chunks</span>
                    </div>
                </div>
            </div>`;
    }).join('');
}

function showTab(tabType, el) {
    document.getElementById('linkForm').style.display = tabType === 'link' ? 'block' : 'none';
    document.getElementById('fileForm').style.display = tabType === 'file' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
}

document.getElementById('linkForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const url = document.getElementById('linkUrl').value;
    const areaId = document.getElementById('areaId').value;
    const name = document.getElementById('linkName').value.trim();
    const fetchMode = document.getElementById('linkFetchMode').value;
    const btn = e.target.querySelector('.btn-primary');
    const originalText = btn.textContent;

    btn.disabled = true;
    btn.textContent = '⏳ Processando...';
    try {
        const res = await fetch(`${API}/api/documents`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                area_id: parseInt(areaId), url, is_external_link: true,
                name: name || new URL(url).hostname,
                fetch_mode: fetchMode
            })
        });
        const data = await res.json();
        if (data.error) {
            alert('Erro: ' + data.error);
        } else {
            document.getElementById('linkUrl').value = '';
            document.getElementById('linkName').value = '';
            loadDocuments();
            alert('Documento incorporado com sucesso!');
        }
    } catch (err) {
        console.error(err);
        alert('Erro ao conectar com a API.');
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
    }
});

document.getElementById('fileForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const fileInput = document.getElementById('fileInput');
    if (fileInput.files.length === 0) { alert('Selecione um arquivo primeiro.'); return; }

    const file = fileInput.files[0];
    const areaId = document.getElementById('areaIdFile').value;
    const btn = e.target.querySelector('.btn-primary');
    const originalText = btn.textContent;

    const formData = new FormData();
    formData.append('file', file);
    formData.append('area_id', areaId);
    formData.append('name', file.name);

    btn.disabled = true;
    btn.textContent = '⏳ Processando...';
    try {
        const res = await fetch(`${API}/api/upload`, { method: 'POST', body: formData });
        const data = await res.json();
        if (data.error) {
            alert('Erro: ' + data.error);
        } else {
            loadDocuments();
            fileInput.value = '';
            alert(`✅ Arquivo "${file.name}" processado com sucesso!\nChunks criados: ${data.rag_result?.saved_count ?? '?'}`);
        }
    } catch (err) {
        console.error(err);
        alert('Erro ao conectar com a API.');
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
    }
});

document.addEventListener('DOMContentLoaded', function() {
    loadAreas();
    loadDocuments();
});
</script>

</body>
</html>
