<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="access-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo — Árvore de Documentos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .btn { background: #60a5fa; color: #0a1628; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; margin-right: 0.5rem; }
        .btn-danger { background: #ef4444; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .actions-bar { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; position: sticky; top: 0; background: #0a1628; padding: 0.75rem 0; z-index: 5; border-bottom: 1px solid #1a2744; }
        .actions-bar .count { color: #94a3b8; font-size: 0.85rem; }

        .area-section { margin-bottom: 1.25rem; border: 1px solid #334155; border-radius: 8px; overflow: hidden; }
        .area-header { display: flex; align-items: center; gap: 0.6rem; padding: 0.85rem 1rem; background: #1e293b; cursor: pointer; user-select: none; }
        .area-header:hover { background: #24324a; }
        .area-header .chevron { color: #64748b; transition: transform 0.15s; font-size: 0.8rem; }
        .area-header.collapsed .chevron { transform: rotate(-90deg); }
        .area-header h3 { color: #f8fafc; font-size: 1.05rem; margin: 0; }
        .area-header .area-count { color: #64748b; font-size: 0.85rem; }
        .area-body { padding: 0.5rem 1rem 1rem; }
        .area-body.collapsed { display: none; }

        .tree-node { }
        .node-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.4rem; border-radius: 6px; }
        .node-row:hover { background: #1a2540; }
        .node-row .chevron { width: 1.1rem; text-align: center; color: #64748b; cursor: pointer; font-size: 0.75rem; flex-shrink: 0; transition: transform 0.15s; }
        .node-row .chevron.collapsed { transform: rotate(-90deg); }
        .node-row .chevron.spacer { cursor: default; visibility: hidden; }
        .node-row input[type="checkbox"] { width: auto; flex-shrink: 0; }
        .node-row .node-name { color: #e2e8f0; font-size: 0.92rem; }
        .node-row .node-meta { color: #64748b; font-size: 0.78rem; white-space: nowrap; }
        .node-children { margin-left: 1.4rem; border-left: 1px dashed #334155; padding-left: 0.6rem; }
        .node-children.collapsed { display: none; }

        .empty-text, .error-text { padding: 1.5rem; text-align: center; }

        .dup-panel { margin-bottom: 1.5rem; border: 1px solid #f59e0b; border-radius: 8px; overflow: hidden; }
        .dup-panel-header { padding: 0.85rem 1rem; background: #3a2e12; color: #fbbf24; font-weight: 600; }
        .dup-group { padding: 0.85rem 1rem; border-top: 1px solid #334155; }
        .dup-group .dup-url { color: #94a3b8; font-size: 0.82rem; margin-bottom: 0.5rem; word-break: break-all; }
        .dup-doc-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.35rem 0; cursor: pointer; }
        .dup-doc-row input[type="radio"] { flex-shrink: 0; }
        .dup-doc-row .node-name { color: #e2e8f0; font-size: 0.9rem; }
        .dup-best { color: #4ade80; font-size: 0.78rem; font-weight: 600; }
        .dup-panel-actions { padding: 0.85rem 1rem; border-top: 1px solid #334155; display: flex; align-items: center; gap: 1rem; }

        @media (max-width: 640px) {
            .node-row .node-meta { display: none; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">&larr; Voltar ao Portal</a>

    <div class="header">
        <h1 class="gradient">&#127795; Árvore de Documentos</h1>
        <p>Estrutura pai/filho dos documentos, organizada por área</p>
    </div>

    <div class="container wide">
        <div class="actions-bar">
            <button class="btn btn-danger" id="deleteSelectedBtn" onclick="deleteSelected()" disabled>Apagar selecionados</button>
            <button class="btn" onclick="loadTree()">Recarregar</button>
            <button class="btn" onclick="checkDuplicates()">Verificar Duplicados</button>
            <button class="btn" onclick="checkLowContent()">Verificar Conteúdo Fraco</button>
            <span class="count" id="selectionCount"></span>
        </div>

        <div id="dupPanel"></div>
        <div id="lowContentPanel"></div>

        <div id="treeContainer"><p class="loading-text">Carregando...</p></div>
    </div>

    <div class="footer">Oráculo &copy; <span id="year"></span></div>

<script>
const API = window.location.protocol + '//' + window.location.host;

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') : ''; }

function statusBadge(status) {
    const s = status || 'pending';
    const labels = { pending: 'pendente', processing: 'processando', indexed: 'indexado', failed: 'falhou' };
    return `<span class="status-badge status-${s}">${labels[s] || s}</span>`;
}

let allDocs = [];
let childrenByParentId = {};
let docsById = {};
let selectedIds = new Set();

async function loadTree() {
    selectedIds.clear();
    updateActionsBar();
    document.getElementById('treeContainer').innerHTML = '<p class="loading-text">Carregando...</p>';
    try {
        const res = await fetch(API + '/admin/documents');
        const data = await res.json();
        allDocs = data.documents || [];
        buildIndexes();
        renderTree();
    } catch (e) {
        document.getElementById('treeContainer').innerHTML = '<p class="error-text">Erro ao carregar documentos.</p>';
    }
}

function buildIndexes() {
    childrenByParentId = {};
    docsById = {};
    for (const d of allDocs) {
        docsById[d.id] = d;
        const key = d.parent_doc_id || 0;
        (childrenByParentId[key] = childrenByParentId[key] || []).push(d);
    }
}

function renderTree() {
    const roots = allDocs.filter(d => !d.parent_doc_id);
    if (!roots.length) {
        document.getElementById('treeContainer').innerHTML = '<p class="empty-text">Nenhum documento encontrado.</p>';
        return;
    }

    const byArea = {};
    for (const d of roots) {
        const area = d.area_name || 'Sem área';
        (byArea[area] = byArea[area] || []).push(d);
    }

    const areaNames = Object.keys(byArea).sort((a, b) => a.localeCompare(b, 'pt-BR'));
    document.getElementById('treeContainer').innerHTML = areaNames.map(areaName => {
        const areaRoots = byArea[areaName];
        const areaId = 'area_' + areaName.replace(/[^a-zA-Z0-9]/g, '_');
        return `
            <div class="area-section">
                <div class="area-header" id="${areaId}_header" onclick="toggleArea('${areaId}')">
                    <span class="chevron">&#9660;</span>
                    <h3>${esc(areaName)}</h3>
                    <span class="area-count">(${areaRoots.length} raiz${areaRoots.length !== 1 ? 'es' : ''})</span>
                </div>
                <div class="area-body" id="${areaId}_body">
                    ${areaRoots.map(d => renderNode(d, 0)).join('')}
                </div>
            </div>
        `;
    }).join('');
}

function toggleArea(areaId) {
    document.getElementById(areaId + '_header').classList.toggle('collapsed');
    document.getElementById(areaId + '_body').classList.toggle('collapsed');
}

function renderNode(doc, depth) {
    const children = childrenByParentId[doc.id] || [];
    const hasChildren = children.length > 0;
    const nodeId = 'node_' + doc.id;
    // Nós com filhos vêm recolhidos por padrão pra árvore não abrir gigante.
    const childrenHtml = hasChildren
        ? `<div class="node-children collapsed" id="${nodeId}_children">${children.map(c => renderNode(c, depth + 1)).join('')}</div>`
        : '';

    return `
        <div class="tree-node">
            <div class="node-row">
                <span class="chevron${hasChildren ? ' collapsed' : ' spacer'}" id="${nodeId}_chevron" ${hasChildren ? `onclick="toggleNode(${doc.id})"` : ''}>&#9660;</span>
                <input type="checkbox" id="${nodeId}_cb" onchange="toggleSelect(${doc.id}, this.checked)">
                <span class="node-name">${esc(doc.name)}</span>
                ${statusBadge(doc.processing_status)}
                <span class="node-meta">${doc.chunk_count || 0} chunks${hasChildren ? ` • ${children.length} filho(s)` : ''}</span>
            </div>
            ${childrenHtml}
        </div>
    `;
}

function toggleNode(id) {
    document.getElementById('node_' + id + '_chevron').classList.toggle('collapsed');
    document.getElementById('node_' + id + '_children').classList.toggle('collapsed');
}

function toggleSelect(id, checked) {
    if (checked) selectedIds.add(id); else selectedIds.delete(id);
    updateActionsBar();
}

function updateActionsBar() {
    const btn = document.getElementById('deleteSelectedBtn');
    const countEl = document.getElementById('selectionCount');
    btn.disabled = selectedIds.size === 0;
    countEl.textContent = selectedIds.size ? `${selectedIds.size} nó(s) marcado(s)` : '';
}

// Coleta o próprio nó + todos os descendentes (DFS), pra qualquer nó marcado.
function collectSubtree(id, acc) {
    acc.add(id);
    const children = childrenByParentId[id] || [];
    for (const c of children) collectSubtree(c.id, acc);
}

async function deleteSelected() {
    const toDelete = new Set();
    for (const id of selectedIds) collectSubtree(id, toDelete);

    const total = toDelete.size;
    if (!total) return;
    const ok = confirm(`Isso vai apagar ${total} documento(s) (os nós marcados e toda a subárvore abaixo deles). Confirmar?`);
    if (!ok) return;

    const btn = document.getElementById('deleteSelectedBtn');
    btn.disabled = true;
    const ids = Array.from(toDelete);
    let done = 0;
    for (const id of ids) {
        btn.textContent = `Apagando ${done + 1} de ${total}...`;
        try {
            await fetch(API + `/admin/documents/${id}`, { method: 'DELETE' });
        } catch (e) {
            // segue tentando os próximos mesmo se um falhar
        }
        done++;
    }
    btn.textContent = 'Apagar selecionados';
    await loadTree();
}

// ---- Duplicados (mesma area+url apareceu mais de uma vez) ----
let dupGroups = [];

async function checkDuplicates() {
    const panel = document.getElementById('dupPanel');
    panel.innerHTML = '<p class="loading-text">Verificando duplicados...</p>';
    try {
        const res = await fetch(API + '/admin/documents/duplicates');
        const data = await res.json();
        dupGroups = data.groups || [];
        if (!dupGroups.length) {
            panel.innerHTML = '';
            alert('Nenhum link duplicado encontrado.');
            return;
        }
        renderDupPanel();
    } catch (e) {
        panel.innerHTML = '';
        alert('Erro ao verificar duplicados.');
    }
}

function renderDupPanel() {
    const panel = document.getElementById('dupPanel');
    panel.innerHTML = `
        <div class="dup-panel">
            <div class="dup-panel-header">⚠ ${dupGroups.length} URL(s) duplicada(s) encontrada(s) — escolha qual versão manter em cada grupo (a recomendada já vem marcada)</div>
            ${dupGroups.map((g, gi) => `
                <div class="dup-group">
                    <div class="dup-url">${esc(g.area_name)} — ${esc(g.url)}</div>
                    ${g.documents.map(d => `
                        <label class="dup-doc-row">
                            <input type="radio" name="dup_keep_${gi}" value="${d.id}" ${d.id === g.recommended_keep_id ? 'checked' : ''}>
                            <span class="node-name">${esc(d.name)}</span>
                            ${statusBadge(d.processing_status)}
                            <span class="node-meta">${d.chunk_count} chunks${d.child_count ? ` • ${d.child_count} filho(s)` : ''}${d.last_processed_at ? ' • processado em ' + new Date(d.last_processed_at).toLocaleString('pt-BR') : ' • nunca processado'}</span>
                            ${d.id === g.recommended_keep_id ? '<span class="dup-best">&#10003; Melhor versão</span>' : ''}
                        </label>
                    `).join('')}
                </div>
            `).join('')}
            <div class="dup-panel-actions">
                <button class="btn" onclick="resolveDuplicates()">Resolver automaticamente</button>
                <button class="btn btn-danger" onclick="closeDupPanel()">Cancelar</button>
            </div>
        </div>
    `;
}

function closeDupPanel() {
    dupGroups = [];
    document.getElementById('dupPanel').innerHTML = '';
}

async function resolveDuplicates() {
    const resolutions = dupGroups.map((g, gi) => {
        const checked = document.querySelector(`input[name="dup_keep_${gi}"]:checked`);
        const keepId = checked ? Number(checked.value) : g.recommended_keep_id;
        const removeIds = g.documents.map(d => d.id).filter(id => id !== keepId);
        return { keep_id: keepId, remove_ids: removeIds };
    });
    const totalRemoved = resolutions.reduce((sum, r) => sum + r.remove_ids.length, 0);
    if (!totalRemoved) { closeDupPanel(); return; }
    const ok = confirm(`Isso vai apagar ${totalRemoved} documento(s) duplicado(s), mantendo a melhor versão de cada grupo (filhos dos removidos são reconectados ao mantido). Confirmar?`);
    if (!ok) return;

    try {
        const res = await fetch(API + '/admin/documents/duplicates/resolve', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ resolutions })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.error || 'Erro ao resolver duplicados.');
        alert(`${data.documents_removed} documento(s) duplicado(s) removido(s).`);
        closeDupPanel();
        loadTree();
    } catch (e) { alert('Erro ao resolver duplicados.'); }
}

// ---- Conteúdo fraco (documento raso, falha de extração, ou muitos chunks curtos/irrelevantes) ----
const LOW_CONTENT_REASON_LABEL = {
    falha_extracao: 'Falha na extração',
    conteudo_total_raso: 'Conteúdo total raso',
    muitos_chunks_curtos: 'Muitos chunks curtos'
};

async function checkLowContent() {
    const panel = document.getElementById('lowContentPanel');
    panel.innerHTML = '<p class="loading-text">Verificando conteúdo fraco...</p>';
    try {
        const res = await fetch(API + '/admin/documents/low-content');
        const data = await res.json();
        const docs = data.documents || [];
        if (!docs.length) {
            panel.innerHTML = '';
            alert('Nenhum documento com conteúdo raso encontrado.');
            return;
        }
        renderLowContentPanel(docs);
    } catch (e) {
        panel.innerHTML = '';
        alert('Erro ao verificar conteúdo fraco.');
    }
}

function renderLowContentPanel(docs) {
    const panel = document.getElementById('lowContentPanel');
    panel.innerHTML = `
        <div class="dup-panel">
            <div class="dup-panel-header">⚠ ${docs.length} documento(s) com conteúdo raso — marque e use "Apagar selecionados", ou reprocesse individualmente</div>
            ${docs.map(d => `
                <div class="dup-group">
                    <label class="dup-doc-row">
                        <input type="checkbox" onchange="toggleSelect(${d.id}, this.checked)">
                        <span class="node-name">${esc(d.name)}</span>
                        ${statusBadge(d.processing_status)}
                        <span class="dup-best">${LOW_CONTENT_REASON_LABEL[d.reason] || d.reason}</span>
                    </label>
                    <div class="node-meta" style="margin-left:1.9rem;">
                        ${esc(d.area_name)} • ${d.content_length} caractere(s) de texto • ${d.short_chunks}/${d.total_chunks} chunk(s) curto(s)
                        ${d.url ? ` • ${esc(d.url)}` : ''}
                    </div>
                    <button class="btn" style="margin-top:0.4rem; margin-left:1.9rem; padding:0.35rem 0.8rem; font-size:0.8rem;" onclick="reprocessDoc(${d.id})">Reprocessar</button>
                </div>
            `).join('')}
        </div>
    `;
}

async function reprocessDoc(id) {
    if (!confirm('Reprocessar RAG deste documento?')) return;
    try {
        await fetch(API + `/admin/documents/${id}/reprocess`, { method: 'POST' });
        alert('Reprocessamento iniciado.');
        loadTree();
    } catch (e) { alert('Erro no reprocessamento.'); }
}

document.getElementById('year').textContent = new Date().getFullYear();
loadTree();
</script>
</body>
</html>
