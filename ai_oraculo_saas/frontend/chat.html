<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo - Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { height: 100vh; display: flex; flex-direction: column; }

        .chat-header { text-align: center; padding: 1rem 1rem 1rem 3.5rem; border-bottom: 1px solid #334155; background: #0f172a; position: relative; }
        .chat-header h1 { font-size: 1.5rem; color: #60a5fa; margin-bottom: 0.25rem; }
        .chat-header p { color: #94a3b8; font-size: 0.9rem; }
        .chat-header .back-link { position: absolute; top: 50%; left: 0.75rem; transform: translateY(-50%); }

        /* Area selector */
        .area-selector { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.6rem; padding: 0.85rem 1rem; border-bottom: 1px solid #334155; background: #0f172a; }
        .area-btn { padding: 0.5rem 1rem; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; white-space: nowrap; }
        .area-btn.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border-color: transparent; }
        .area-btn.all-btn { border-style: dashed; }
        .area-hint { width: 100%; text-align: center; color: #64748b; font-size: 0.75rem; margin-top: -0.35rem; }

        /* Saldo de créditos */
        .balance-bar { text-align: center; padding: 0.4rem 1rem; font-size: 0.8rem; color: #94a3b8; background: #0f172a; border-bottom: 1px solid #334155; }
        .balance-bar .balance-value { font-weight: 600; }
        .balance-bar .low { color: #f87171; }

        /* Banner de saldo esgotado */
        .credit-banner { max-width: min(80%, 640px); margin: 0 0 1rem; background: #2a1215; border: 1px solid #ef4444; border-radius: 12px; padding: 1rem; }
        .credit-banner h4 { color: #f87171; margin-bottom: 0.5rem; }
        .credit-banner table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; font-size: 0.8rem; }
        .credit-banner th, .credit-banner td { text-align: left; padding: 0.3rem 0.4rem; border-bottom: 1px solid #4a1f27; color: #e0e0e0; }
        .credit-banner th { color: #f87171; font-weight: 600; }

        /* Context sources (transparência de área por trecho) */
        .msg-sources { margin-top: 0.5rem; font-size: 0.75rem; }
        .msg-sources summary { cursor: pointer; color: #64748b; }
        .msg-source-item { padding: 0.35rem 0; border-top: 1px solid #334155; color: #94a3b8; }
        .msg-source-item .area-tag { display: inline-block; background: #334155; color: #a78bfa; border-radius: 4px; padding: 0.05rem 0.4rem; margin-right: 0.4rem; font-size: 0.7rem; }

        /* Chat container */
        .chat-container { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }

        /* Messages */
        .message { max-width: min(80%, 640px); margin-bottom: 1rem; }
        .user-message { align-self: flex-end; background: #3b5998; color: white; padding: 1rem; border-radius: 12px 12px 0 12px; margin-left: auto; word-wrap: break-word; }
        .assistant-message { background: #1e293b; padding: 1rem; border-radius: 12px 12px 12px 0; border-left: 3px solid #60a5fa; word-wrap: break-word; }

        .msg-meta { font-size: 0.8rem; color: #64748b; margin-top: 0.5rem; }
        .user-message .msg-meta { text-align: right; color: rgba(255,255,255,0.7); }

        /* Input area */
        .input-area { padding: 1rem; background: #0f172a; border-top: 1px solid #334155; display: flex; gap: 0.5rem; }
        .input-area input[type="text"] { flex: 1; }
        .send-btn { flex-shrink: 0; padding: 0.75rem 1.5rem; }

        @media (max-width: 480px) {
            .send-btn span.label { display: none; }
            .send-btn { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>

<div class="chat-header">
    <a href="index.html" class="back-link">&larr; Portal</a>
    <h1>&#128172; Chat com Oráculo</h1>
    <p>Pergunte sobre uma ou mais áreas e receba respostas fundamentadas nos documentos indexados.</p>
</div>

<!-- Saldo de créditos -->
<div class="balance-bar" id="balanceBar" style="display:none;"></div>

<!-- Area selector -->
<div class="area-selector" id="areaSelector">
    <span style="color: #64748b;">Carregando áreas...</span>
</div>
<div class="area-selector" style="padding-top:0; border-top:none;">
    <span class="area-hint">Toque para marcar/desmarcar áreas — pode combinar mais de uma</span>
</div>

<!-- Chat container -->
<div class="chat-container" id="chatContainer"></div>

<!-- Input area -->
<div class="input-area">
    <input type="text" id="messageInput" placeholder="Digite sua pergunta..." />
    <button class="send-btn btn-primary" onclick="sendMessage()">&#128640; <span class="label">Enviar</span></button>
</div>

<script>
const API = window.location.protocol + '//' + window.location.host;

const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
let selectedAreaIds = new Set(); // vazio = "todas as áreas"
let allAreas = [];

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function getApiKey() {
    let key = localStorage.getItem('oraculo_api_key');
    if (!key) {
        key = prompt('Chave de acesso (fornecida pelo administrador):');
        if (key) localStorage.setItem('oraculo_api_key', key.trim());
    }
    return key || '';
}

// Carregar áreas do backend e renderizar chips de seleção múltipla
async function loadAreas() {
    try {
        const res = await fetch(`${API}/api/areas`, { headers: { 'X-Oraculo-Key': getApiKey() } });
        const data = await res.json();
        if (!data.areas || data.areas.length === 0) {
            document.getElementById('areaSelector').innerHTML = '<span style="color:#94a3b8;">Nenhuma área disponível no seu plano. Fale com o administrador.</span>';
            return;
        }
        allAreas = data.areas;

        const selector = document.getElementById('areaSelector');
        selector.innerHTML = '';

        const allBtn = document.createElement('button');
        allBtn.className = 'area-btn all-btn active';
        allBtn.dataset.area = 'all';
        allBtn.textContent = '✦ Todas as áreas';
        allBtn.addEventListener('click', () => {
            selectedAreaIds.clear();
            renderAreaSelection();
        });
        selector.appendChild(allBtn);

        data.areas.forEach(a => {
            const btn = document.createElement('button');
            btn.className = 'area-btn';
            btn.dataset.area = a.id;
            btn.textContent = a.name;
            btn.addEventListener('click', () => {
                if (selectedAreaIds.has(a.id)) selectedAreaIds.delete(a.id);
                else selectedAreaIds.add(a.id);
                renderAreaSelection();
            });
            selector.appendChild(btn);
        });

        // Padrão: uma única área selecionada (a primeira) — igual ao
        // comportamento de sempre. "Todas as áreas" continua disponível,
        // mas só entra se o usuário escolher explicitamente.
        selectedAreaIds.add(data.areas[0].id);
        renderAreaSelection();
    } catch (err) {
        console.error('Erro ao carregar áreas:', err);
        document.getElementById('areaSelector').innerHTML = '<span style="color:#ef4444;">API indisponível</span>';
    }
}

function renderAreaSelection() {
    const noneSelected = selectedAreaIds.size === 0;
    document.querySelectorAll('.area-btn').forEach(btn => {
        const isAll = btn.dataset.area === 'all';
        const active = isAll ? noneSelected : selectedAreaIds.has(Number(btn.dataset.area));
        btn.classList.toggle('active', active);
    });
}

// Saldo de créditos — só aparece se o cliente tiver uma chave válida com
// plano/modelo participando do sistema de crédito (senão /api/my-credits
// simplesmente não é chamado com sucesso e a barra fica escondida).
function updateBalanceBar(balance) {
    const bar = document.getElementById('balanceBar');
    if (balance == null) { bar.style.display = 'none'; return; }
    bar.style.display = 'block';
    const low = balance <= 0;
    bar.innerHTML = `Saldo de créditos: <span class="balance-value${low ? ' low' : ''}">R$ ${Number(balance).toFixed(2)}</span>`;
}

async function refreshBalance() {
    const key = getApiKey();
    if (!key) return;
    try {
        const res = await fetch(`${API}/api/my-credits`, { headers: { 'X-Oraculo-Key': key } });
        if (!res.ok) return; // cliente sem plano de crédito — sem barra, sem erro
        const data = await res.json();
        updateBalanceBar(data.balance);
    } catch (err) { /* silencioso — barra de saldo é informativa, não crítica */ }
}

function renderCreditBanner(creditStatus) {
    const banner = document.createElement('div');
    banner.className = 'credit-banner';
    const rows = (creditStatus.recent || []).map(r => `
        <tr>
            <td>${r.date ? new Date(r.date).toLocaleString('pt-BR') : '-'}</td>
            <td>${(r.tokens_input || 0) + (r.tokens_output || 0)} tokens</td>
            <td>R$ ${Number(r.amount).toFixed(2)}</td>
        </tr>
    `).join('');
    banner.innerHTML = `
        <h4>⚠ Seus créditos acabaram</h4>
        <p>Saldo atual: <strong>R$ ${Number(creditStatus.balance).toFixed(2)}</strong></p>
        ${rows ? `<table><thead><tr><th>Data</th><th>Tokens</th><th>Valor</th></tr></thead><tbody>${rows}</tbody></table>` : ''}
        <p style="margin-top:0.5rem; color:#94a3b8; font-size:0.85rem;">Fale com o administrador para recarregar seu saldo.</p>
    `;
    chatContainer.appendChild(banner);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    addMessage('user', text);
    messageInput.value = '';
    messageInput.disabled = true;

    const loadingMsg = document.createElement('div');
    loadingMsg.classList.add('message', 'assistant-message');
    loadingMsg.innerHTML = '<div style="color: #64748b; font-style: italic;">Pensando...</div>';
    chatContainer.appendChild(loadingMsg);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    try {
        const areaIds = selectedAreaIds.size > 0 ? Array.from(selectedAreaIds) : null;
        const res = await fetch(`${API}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Oraculo-Key': getApiKey() },
            body: JSON.stringify({ message: text, area_ids: areaIds })
        });
        chatContainer.removeChild(loadingMsg);

        const data = await res.json();
        if (res.status === 402 && data.credit_status) {
            renderCreditBanner(data.credit_status);
            updateBalanceBar(data.credit_status.balance);
        } else if (data.error) {
            addMessage('assistant', `Erro: ${data.error}`);
        } else {
            addMessage('assistant', data.response || 'Sem resposta.', data.context_sources);
            if (data.quota_warning) addMessage('assistant', `⚠ ${data.quota_warning}`);
            if (data.credit_status) {
                updateBalanceBar(data.credit_status.balance);
                if (data.credit_status.depleted) renderCreditBanner(data.credit_status);
            }
        }
    } catch (err) {
        chatContainer.removeChild(loadingMsg);
        console.error(err);
        addMessage('assistant', 'Erro ao conectar com a API. Verifique se o servidor está rodando.');
    } finally {
        messageInput.disabled = false;
        messageInput.focus();
    }
}

function addMessage(role, content, contextSources) {
    const msgEl = document.createElement('div');
    msgEl.classList.add('message');
    if (role === 'user') {
        msgEl.classList.add('user-message');
        msgEl.innerHTML = `<div>${esc(content)}</div><div class="msg-meta">Você • ${new Date().toLocaleTimeString('pt-BR')}</div>`;
    } else {
        msgEl.classList.add('assistant-message');
        let sourcesHtml = '';
        if (contextSources && contextSources.length > 0) {
            const items = contextSources.map(s => `
                <div class="msg-source-item"><span class="area-tag">${esc(s.area_name || '')}</span>${esc(s.source)} (similaridade ${(s.similarity * 100).toFixed(0)}%)</div>
            `).join('');
            sourcesHtml = `<details class="msg-sources"><summary>${contextSources.length} trecho(s) usado(s) como contexto</summary>${items}</details>`;
        }
        msgEl.innerHTML = `<div>${esc(content).replace(/\n/g, '<br>')}</div>${sourcesHtml}<div class="msg-meta">Oráculo • RAG Search</div>`;
    }
    chatContainer.appendChild(msgEl);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

messageInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
});

document.addEventListener('DOMContentLoaded', async function() {
    await loadAreas();
    refreshBalance();
    addMessage('assistant', 'Olá! Sou o Oráculo. Uma área já vem selecionada no topo — marque outras para combinar, ou escolha "Todas as áreas" se quiser buscar em tudo.');
});
</script>

</body>
</html>
