<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a1628; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

        .header { text-align: center; padding: 1.5rem 1rem; border-bottom: 1px solid #334155; background: #0f172a; }
        .header h1 { font-size: 1.8rem; color: #60a5fa; margin-bottom: 0.5rem; }

        /* Area selector */
        .area-selector { display: flex; justify-content: center; gap: 1rem; padding: 1rem; border-bottom: 1px solid #334155; background: #0f172a; }
        .area-btn { padding: 0.5rem 1rem; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
        .area-btn.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border-color: transparent; }

        /* Chat container */
        .chat-container { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }

        /* Messages */
        .message { max-width: 80%; margin-bottom: 1rem; }
        .user-message { align-self: flex-end; background: #3b5998; color: white; padding: 1rem; border-radius: 12px 12px 0 12px; margin-left: auto; }
        .assistant-message { background: #1e293b; padding: 1rem; border-radius: 12px 12px 12px 0; border-left: 3px solid #60a5fa; }

        /* Message metadata */
        .msg-meta { font-size: 0.8rem; color: #64748b; margin-top: 0.5rem; }
        .user-message .msg-meta { text-align: right; color: rgba(255,255,255,0.7); }

        /* Input area */
        .input-area { padding: 1rem; background: #0f172a; border-top: 1px solid #334155; display: flex; gap: 0.5rem; }
        .input-area input[type="text"] { flex: 1; padding: 0.75rem 1rem; background: #1e293b; border: 1px solid #334155; color: #f8fafc; border-radius: 8px; font-size: 1rem; }
        .input-area input[type="text"]:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1); }

        .send-btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3); }

        /* Back link */
        .back-link { position: absolute; top: 1rem; left: 1rem; color: #64748b; text-decoration: none; font-size: 0.9rem; padding: 0.5rem 1rem; border: 1px solid #334155; border-radius: 8px; }
    </style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Portal</a>

<div class="header">
    <h1>&#128172; Chat com IA Tutor</h1>
    <p style="color: #94a3b8;">Pergunte sobre qualquer área e receba respostas fundamentadas nos documentos indexados.</p>
</div>

<!-- Area selector -->
<div class="area-selector" id="areaSelector">
    <span style="color: #64748b;">Carregando áreas...</span>
</div>

<!-- Chat container -->
<div class="chat-container" id="chatContainer"></div>

<!-- Input area -->
<div class="input-area">
    <input type="text" id="messageInput" placeholder="Digite sua pergunta..." />
    <button class="send-btn" onclick="sendMessage()">&#128640; Enviar</button>
</div>

<script>
const API = window.location.protocol + '//' + window.location.host;

const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
let currentAreaId = '';
let conversationHistory = [];

// Carregar áreas do backend e renderizar botões
async function loadAreas() {
    try {
        const res = await fetch(`${API}/api/areas`);
        const data = await res.json();
        if (!data.areas || data.areas.length === 0) return;

        const selector = document.getElementById('areaSelector');
        selector.innerHTML = '';
        data.areas.forEach((a, i) => {
            const btn = document.createElement('button');
            btn.className = `area-btn${i === 0 ? ' active' : ''}`;
            btn.dataset.area = a.id;
            btn.textContent = a.name;
            selector.appendChild(btn);
        });

        // Selecionar primeira área por padrão
        currentAreaId = data.areas[0].id;

        // Event listeners nos botões
        document.querySelectorAll('.area-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentAreaId = this.dataset.area;
            });
        });
    } catch (err) {
        console.error('Erro ao carregar áreas:', err);
        document.getElementById('areaSelector').innerHTML = '<span style="color:#ef4444;">API indisponível</span>';
    }
}

// Enviar mensagem real para a API
async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text, area_id: currentAreaId });
    messageInput.value = '';

    // Loading indicator
    const loadingMsg = document.createElement('div');
    loadingMsg.classList.add('message', 'assistant-message');
    loadingMsg.innerHTML = '<div style="color: #64748b; font-style: italic;">Pensando...</div>';
    chatContainer.appendChild(loadingMsg);

    try {
        const res = await fetch(`${API}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, area_id: parseInt(currentAreaId) })
        });
        chatContainer.removeChild(loadingMsg);

        const data = await res.json();
        if (data.error) {
            addMessage('assistant', `Erro: ${data.error}`);
        } else {
            addMessage('assistant', data.response || 'Sem resposta.');
            conversationHistory.push({ role: 'assistant', content: data.response });
        }
    } catch (err) {
        chatContainer.removeChild(loadingMsg);
        console.error(err);
        addMessage('assistant', 'Erro ao conectar com a API. Verifique se o servidor está rodando.');
    }
}

function addMessage(role, content) {
    const msgEl = document.createElement('div');
    msgEl.classList.add('message');
    if (role === 'user') {
        msgEl.classList.add('user-message');
        msgEl.innerHTML = `<div>${content}</div><div class="msg-meta">Você • ${new Date().toLocaleTimeString('pt-BR')}</div>`;
    } else {
        msgEl.classList.add('assistant-message');
        msgEl.innerHTML = `<div>${content.replace(/\n/g, '<br>')}</div><div class="msg-meta">AI Tutor • RAG Search</div>`;
    }
    chatContainer.appendChild(msgEl);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

messageInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
});

document.addEventListener('DOMContentLoaded', async function() {
    await loadAreas();
    addMessage('assistant', 'Olá! Sou o AI Tutor. Selecione uma área no topo e faça sua pergunta.');
});
</script>

</body>
</html>
