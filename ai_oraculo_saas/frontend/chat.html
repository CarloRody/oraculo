<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo - Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { height: 100vh; display: flex; flex-direction: column; }

        .chat-header { text-align: center; padding: 1rem 1rem 1rem 3.5rem; border-bottom: 1px solid #334155; background: #0f172a; position: relative; }
        .chat-header h1 { font-size: 1.5rem; color: #60a5fa; margin-bottom: 0.25rem; }
        .chat-header p { color: #94a3b8; font-size: 0.9rem; }
        .chat-header .back-link { position: absolute; top: 50%; left: 0.75rem; transform: translateY(-50%); }

        /* Area selector */
        .area-selector { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.6rem; padding: 0.85rem 1rem; border-bottom: 1px solid #334155; background: #0f172a; }
        .area-btn { padding: 0.5rem 1rem; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; white-space: nowrap; }
        .area-btn.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border-color: transparent; }

        /* Chat container */
        .chat-container { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }

        /* Messages */
        .message { max-width: min(80%, 640px); margin-bottom: 1rem; }
        .user-message { align-self: flex-end; background: #3b5998; color: white; padding: 1rem; border-radius: 12px 12px 0 12px; margin-left: auto; word-wrap: break-word; }
        .assistant-message { background: #1e293b; padding: 1rem; border-radius: 12px 12px 12px 0; border-left: 3px solid #60a5fa; word-wrap: break-word; }

        .msg-meta { font-size: 0.8rem; color: #64748b; margin-top: 0.5rem; }
        .user-message .msg-meta { text-align: right; color: rgba(255,255,255,0.7); }

        /* Input area */
        .input-area { padding: 1rem; background: #0f172a; border-top: 1px solid #334155; display: flex; gap: 0.5rem; }
        .input-area input[type="text"] { flex: 1; }
        .send-btn { flex-shrink: 0; padding: 0.75rem 1.5rem; }

        @media (max-width: 480px) {
            .send-btn span.label { display: none; }
            .send-btn { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>

<div class="chat-header">
    <a href="index.html" class="back-link">&larr; Portal</a>
    <h1>&#128172; Chat com Oráculo</h1>
    <p>Pergunte sobre qualquer área e receba respostas fundamentadas nos documentos indexados.</p>
</div>

<!-- Area selector -->
<div class="area-selector" id="areaSelector">
    <span style="color: #64748b;">Carregando áreas...</span>
</div>

<!-- Chat container -->
<div class="chat-container" id="chatContainer"></div>

<!-- Input area -->
<div class="input-area">
    <input type="text" id="messageInput" placeholder="Digite sua pergunta..." />
    <button class="send-btn btn-primary" onclick="sendMessage()">&#128640; <span class="label">Enviar</span></button>
</div>

<script>
const API = window.location.protocol + '//' + window.location.host;

const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
let currentAreaId = '';

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function getApiKey() {
    let key = localStorage.getItem('oraculo_api_key');
    if (!key) {
        key = prompt('Chave de acesso (fornecida pelo administrador):');
        if (key) localStorage.setItem('oraculo_api_key', key.trim());
    }
    return key || '';
}

// Carregar áreas do backend e renderizar botões
async function loadAreas() {
    try {
        const res = await fetch(`${API}/api/areas`);
        const data = await res.json();
        if (!data.areas || data.areas.length === 0) return;

        const selector = document.getElementById('areaSelector');
        selector.innerHTML = '';
        data.areas.forEach((a, i) => {
            const btn = document.createElement('button');
            btn.className = `area-btn${i === 0 ? ' active' : ''}`;
            btn.dataset.area = a.id;
            btn.textContent = a.name;
            selector.appendChild(btn);
        });

        currentAreaId = data.areas[0].id;

        document.querySelectorAll('.area-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentAreaId = this.dataset.area;
            });
        });
    } catch (err) {
        console.error('Erro ao carregar áreas:', err);
        document.getElementById('areaSelector').innerHTML = '<span style="color:#ef4444;">API indisponível</span>';
    }
}

async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    if (!currentAreaId) { addMessage('assistant', 'Selecione uma área antes de perguntar.'); return; }

    addMessage('user', text);
    messageInput.value = '';
    messageInput.disabled = true;

    const loadingMsg = document.createElement('div');
    loadingMsg.classList.add('message', 'assistant-message');
    loadingMsg.innerHTML = '<div style="color: #64748b; font-style: italic;">Pensando...</div>';
    chatContainer.appendChild(loadingMsg);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    try {
        const res = await fetch(`${API}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Oraculo-Key': getApiKey() },
            body: JSON.stringify({ message: text, area_id: parseInt(currentAreaId) })
        });
        chatContainer.removeChild(loadingMsg);

        const data = await res.json();
        if (data.error) {
            addMessage('assistant', `Erro: ${data.error}`);
        } else {
            addMessage('assistant', data.response || 'Sem resposta.');
            if (data.quota_warning) addMessage('assistant', `⚠ ${data.quota_warning}`);
        }
    } catch (err) {
        chatContainer.removeChild(loadingMsg);
        console.error(err);
        addMessage('assistant', 'Erro ao conectar com a API. Verifique se o servidor está rodando.');
    } finally {
        messageInput.disabled = false;
        messageInput.focus();
    }
}

function addMessage(role, content) {
    const msgEl = document.createElement('div');
    msgEl.classList.add('message');
    if (role === 'user') {
        msgEl.classList.add('user-message');
        msgEl.innerHTML = `<div>${esc(content)}</div><div class="msg-meta">Você • ${new Date().toLocaleTimeString('pt-BR')}</div>`;
    } else {
        msgEl.classList.add('assistant-message');
        msgEl.innerHTML = `<div>${esc(content).replace(/\n/g, '<br>')}</div><div class="msg-meta">Oráculo • RAG Search</div>`;
    }
    chatContainer.appendChild(msgEl);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

messageInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
});

document.addEventListener('DOMContentLoaded', async function() {
    await loadAreas();
    addMessage('assistant', 'Olá! Sou o Oráculo. Selecione uma área no topo e faça sua pergunta.');
});
</script>

</body>
</html>
