# Monitor Agent API — Configuration

server:
  host: "0.0.0.0"
  port: 5003
  reload: false  # auto-reload during dev

database:
  dbname: "ai_tutor_db"
  user: "postgres"
  host: "/var/run/postgresql"

# RAG processing is delegated to the Tutor's HTTP API (POST /api/process/<doc_id>),
# not imported as a library — avoids duplicating sentence-transformers/torch and
# loading a second copy of the embedding model into RAM. See rag_wrapper.py.
# Base URL is read from the TUTOR_API_URL env var (default: http://localhost:5001).

monitoring:
  default_cron: "0 6 * * 0"  # Sunday 06:00 local time
  fetch_timeout: 30           # seconds per URL fetch
