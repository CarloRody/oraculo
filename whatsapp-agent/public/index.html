<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp — Oráculo</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #0a1628;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 2rem;
    }
    h1 {
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 1.8rem;
        margin-bottom: 0.25rem;
    }
    .subtitle { color: #64748b; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid #334155; margin-bottom: 1.5rem; }
    .tab-btn {
        background: none; border: none; color: #94a3b8; font-size: 0.95rem;
        padding: 0.6rem 1.2rem; cursor: pointer; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        max-width: 700px;
    }
    .card h2 { font-size: 1.1rem; color: #f8fafc; margin-bottom: 1rem; }
    .form-row { display: flex; gap: 0.75rem; }
    .form-input {
        flex: 1;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 0.6rem 0.8rem;
        color: #e0e0e0;
        font-size: 0.9rem;
    }
    select.form-input { flex: none; }
    .btn {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border: none;
        border-radius: 6px;
        color: #fff;
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
        cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
    .btn-danger { background: #ef4444; }
    .btn-secondary { background: #334155; }
    .account-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.9rem 0;
        border-bottom: 1px solid #1a2744;
    }
    .account-row:last-child { border-bottom: none; }
    .account-info { display: flex; align-items: center; gap: 0.6rem; }
    .status-badge {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 600;
    }
    .status-connected { background: #1f4a2d; color: #4ade80; }
    .status-qr_pending, .status-connecting { background: #4a3a1f; color: #fbbf24; }
    .status-disconnected { background: #1a2744; color: #94a3b8; }
    .status-error { background: #4a1f27; color: #f87171; }
    .account-actions { display: flex; gap: 0.5rem; }
    .empty { color: #64748b; font-size: 0.9rem; padding: 1rem 0; }
    .modal-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.6);
        align-items: center; justify-content: center;
        z-index: 100;
    }
    .modal-overlay.active { display: flex; }
    .modal {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 2rem;
        text-align: center;
        max-width: 360px;
    }
    .modal h3 { color: #f8fafc; margin-bottom: 1rem; }
    .modal img { width: 260px; height: 260px; border-radius: 8px; background: #fff; padding: 8px; }
    .modal p { color: #94a3b8; font-size: 0.85rem; margin-top: 1rem; }
    .modal .close-btn { margin-top: 1.25rem; }

    /* Conversas */
    .chat-app {
        display: grid;
        grid-template-columns: 280px 1fr;
        height: 70vh;
        max-width: 1000px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        overflow: hidden;
    }
    .chat-list { border-right: 1px solid #334155; overflow-y: auto; }
    .chat-list-item {
        padding: 0.8rem 1rem; border-bottom: 1px solid #1a2744; cursor: pointer;
    }
    .chat-list-item:hover { background: #24324a; }
    .chat-list-item.active { background: #24324a; border-left: 3px solid #60a5fa; }
    .chat-list-item .name { font-weight: 600; color: #f8fafc; font-size: 0.9rem; }
    .chat-list-item .preview {
        color: #94a3b8; font-size: 0.8rem; margin-top: 0.2rem;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .unread-badge {
        display: inline-block; background: #3b82f6; color: #fff; border-radius: 10px;
        font-size: 0.7rem; padding: 0.05rem 0.45rem; margin-left: 0.4rem;
    }
    .chat-panel { display: flex; flex-direction: column; }
    .chat-panel-header { padding: 0.9rem 1.2rem; border-bottom: 1px solid #334155; font-weight: 600; color: #f8fafc; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .msg-bubble {
        max-width: 65%; padding: 0.5rem 0.8rem; border-radius: 10px; font-size: 0.88rem;
        line-height: 1.4; word-wrap: break-word;
    }
    .msg-in { align-self: flex-start; background: #334155; color: #e0e0e0; }
    .msg-out { align-self: flex-end; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; }
    .msg-time { display: block; font-size: 0.65rem; opacity: 0.7; margin-top: 0.2rem; text-align: right; }
    .chat-input-row { display: flex; gap: 0.5rem; padding: 0.8rem; border-top: 1px solid #334155; }
    .chat-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #64748b; font-size: 0.9rem; }
</style>
</head>
<body>

<h1>📱 WhatsApp</h1>
<p class="subtitle">Serviço independente do Oráculo — porta 5005</p>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('accounts')">Contas</button>
    <button class="tab-btn" onclick="switchTab('chats')">Conversas</button>
</div>

<div id="accounts-tab" class="tab-content active">
    <div class="card">
        <h2>+ Nova Conta (QR Code)</h2>
        <div class="form-row">
            <input type="text" class="form-input" id="newAccountLabel" placeholder="Rótulo, ex: Comercial">
            <select class="form-input" id="newAccountClient" style="flex:none; width:220px;">
                <option value="">Sem cliente vinculado</option>
            </select>
            <button class="btn" onclick="createAccount()">Criar</button>
        </div>
    </div>

    <div class="card">
        <h2>Contas</h2>
        <div id="accountsList"><p class="empty">Carregando...</p></div>
    </div>
</div>

<div id="chats-tab" class="tab-content">
    <div class="card" style="max-width:1000px;">
        <div class="form-row" style="align-items:center;">
            <label style="color:#94a3b8; font-size:0.85rem;">Conta:</label>
            <select class="form-input" id="chatAccountSelect" onchange="onChatAccountChange()"></select>
            <button class="btn btn-sm" onclick="openStartChatModal()">+ Nova conversa</button>
        </div>
    </div>

    <div class="chat-app">
        <div class="chat-list" id="chatList"><p class="empty" style="padding:1rem;">Selecione uma conta.</p></div>
        <div class="chat-panel">
            <div class="chat-panel-header" id="chatPanelHeader">Selecione uma conversa</div>
            <div class="chat-messages" id="chatMessages"><div class="chat-empty">Nenhuma conversa aberta</div></div>
            <div class="chat-input-row">
                <input type="text" class="form-input" id="chatTextInput" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter') sendChatMessage()">
                <button class="btn" onclick="sendChatMessage()">Enviar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="qrModal">
    <div class="modal">
        <h3>Escaneie com o WhatsApp</h3>
        <img id="qrImage" src="" alt="QR Code">
        <p id="qrStatusText">Aguardando leitura...</p>
        <button class="btn btn-secondary close-btn" onclick="closeQrModal()">Fechar</button>
    </div>
</div>

<div class="modal-overlay" id="clientModal">
    <div class="modal" style="max-width:320px;">
        <h3>Vincular cliente</h3>
        <div style="text-align:left; margin-top:1rem;">
            <label style="color:#94a3b8; font-size:0.8rem;">Cliente</label>
            <select class="form-input" id="clientModalSelect" style="margin:0.4rem 0;">
                <option value="">Sem cliente vinculado</option>
            </select>
        </div>
        <div style="display:flex; gap:0.5rem; margin-top:1rem;">
            <button class="btn btn-secondary" style="flex:1;" onclick="closeClientModal()">Cancelar</button>
            <button class="btn" style="flex:1;" onclick="submitClientModal()">Salvar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="startChatModal">
    <div class="modal" style="max-width:320px;">
        <h3>Nova conversa</h3>
        <div style="text-align:left; margin-top:1rem;">
            <label style="color:#94a3b8; font-size:0.8rem;">Telefone (com DDI, só números)</label>
            <input type="text" class="form-input" id="startChatPhone" placeholder="5511999999999" style="margin:0.4rem 0 0.8rem;">
            <label style="color:#94a3b8; font-size:0.8rem;">Mensagem</label>
            <input type="text" class="form-input" id="startChatText" placeholder="Olá!" style="margin:0.4rem 0;">
        </div>
        <div style="display:flex; gap:0.5rem; margin-top:1rem;">
            <button class="btn btn-secondary" style="flex:1;" onclick="closeStartChatModal()">Cancelar</button>
            <button class="btn" style="flex:1;" onclick="submitStartChat()">Enviar</button>
        </div>
    </div>
</div>

<script>
const API = window.location.origin;
let pollTimer = null;

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

// ---- Tabs ----
function switchTab(name) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(name + '-tab').classList.add('active');
    event.target.classList.add('active');
    if (name === 'chats') initChatsTab();
}

// ---- Contas ----
async function fetchAccounts() {
    const res = await fetch(API + '/api/whatsapp/accounts');
    const data = await res.json();
    return data.accounts || [];
}

function statusLabel(status) {
    return {
        connected: 'Conectado',
        qr_pending: 'Aguardando QR',
        connecting: 'Conectando',
        disconnected: 'Desconectado',
        error: 'Erro',
    }[status] || status;
}

async function renderAccounts() {
    const accounts = await fetchAccounts();
    const el = document.getElementById('accountsList');
    if (!accounts.length) {
        el.innerHTML = '<p class="empty">Nenhuma conta cadastrada ainda.</p>';
        return;
    }
    el.innerHTML = accounts.map(a => `
        <div class="account-row">
            <div class="account-info" style="flex-direction:column; align-items:flex-start; gap:0.15rem;">
                <div>
                    <strong>${esc(a.label)}</strong>
                    <span class="status-badge status-${a.status}">${statusLabel(a.status)}</span>
                </div>
                <div style="font-size:0.78rem; color:#64748b;">
                    ${a.client_email ? `👤 ${esc(a.client_email)}` : 'Sem cliente vinculado'}
                    <a href="#" onclick="openClientModal(${a.id}, ${a.user_id ?? 'null'}); return false;" style="color:#60a5fa; margin-left:0.4rem;">editar</a>
                </div>
            </div>
            <div class="account-actions">
                ${a.status === 'connected'
                    ? `<button class="btn btn-sm btn-secondary" onclick="disconnectAccount(${a.id})">Desconectar</button>`
                    : `<button class="btn btn-sm" onclick="connectAccount(${a.id})">Conectar</button>`}
                <button class="btn btn-sm btn-danger" onclick="removeAccount(${a.id})">🗑</button>
            </div>
        </div>
    `).join('');
}

let allClients = [];

async function loadClients() {
    const res = await fetch(API + '/api/whatsapp/clients');
    const data = await res.json();
    allClients = data.clients || [];
    const options = '<option value="">Sem cliente vinculado</option>' +
        allClients.map(c => `<option value="${c.id}">${esc(c.email)}</option>`).join('');
    document.getElementById('newAccountClient').innerHTML = options;
    document.getElementById('clientModalSelect').innerHTML = options;
}

async function createAccount() {
    const input = document.getElementById('newAccountLabel');
    const label = input.value.trim();
    const userId = document.getElementById('newAccountClient').value;
    if (!label) return;
    const res = await fetch(API + '/api/whatsapp/accounts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ label, connection_type: 'qrcode', user_id: userId ? Number(userId) : null }),
    });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message || 'Erro ao criar conta');
        return;
    }
    input.value = '';
    document.getElementById('newAccountClient').value = '';
    await renderAccounts();
}

let clientModalAccountId = null;

function openClientModal(accountId, currentUserId) {
    clientModalAccountId = accountId;
    document.getElementById('clientModalSelect').value = currentUserId || '';
    document.getElementById('clientModal').classList.add('active');
}

function closeClientModal() {
    document.getElementById('clientModal').classList.remove('active');
    clientModalAccountId = null;
}

async function submitClientModal() {
    const userId = document.getElementById('clientModalSelect').value;
    await fetch(API + `/api/whatsapp/accounts/${clientModalAccountId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId ? Number(userId) : null }),
    });
    closeClientModal();
    await renderAccounts();
}

async function removeAccount(id) {
    if (!confirm('Remover esta conta? Isso desconecta o WhatsApp e apaga o cadastro.')) return;
    await fetch(API + `/api/whatsapp/accounts/${id}`, { method: 'DELETE' });
    await renderAccounts();
}

async function disconnectAccount(id) {
    await fetch(API + `/api/whatsapp/accounts/${id}/disconnect`, { method: 'POST' });
    await renderAccounts();
}

async function connectAccount(id) {
    document.getElementById('qrStatusText').textContent = 'Gerando QR Code...';
    document.getElementById('qrImage').src = '';
    document.getElementById('qrModal').classList.add('active');

    const res = await fetch(API + `/api/whatsapp/accounts/${id}/connect`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) {
        document.getElementById('qrStatusText').textContent = data.message || 'Erro ao conectar';
        return;
    }
    if (data.status === 'connected') {
        document.getElementById('qrStatusText').textContent = 'Já estava conectado!';
        setTimeout(closeQrModal, 1200);
        await renderAccounts();
        return;
    }
    const src = data.qr_base64.startsWith('data:') ? data.qr_base64 : `data:image/png;base64,${data.qr_base64}`;
    document.getElementById('qrImage').src = src;
    document.getElementById('qrStatusText').textContent = 'Aguardando leitura...';
    startQrPolling(id);
}

function startQrPolling(accountId) {
    stopQrPolling();
    pollTimer = setInterval(async () => {
        const res = await fetch(API + `/api/whatsapp/accounts/${accountId}/status`);
        const data = await res.json();
        if (!data.ok) return;
        if (data.account.status === 'connected') {
            document.getElementById('qrStatusText').textContent = 'Conectado! ✅';
            stopQrPolling();
            setTimeout(closeQrModal, 1200);
            await renderAccounts();
        }
    }, 2000);
}

function stopQrPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = null;
}

function closeQrModal() {
    document.getElementById('qrModal').classList.remove('active');
    stopQrPolling();
    renderAccounts();
}

// ---- Conversas ----
let chatsInited = false;
let currentAccountId = null;
let currentChatId = null;
let chatListTimer = null;
let messagesTimer = null;

async function initChatsTab() {
    const accounts = await fetchAccounts();
    const sel = document.getElementById('chatAccountSelect');
    const connected = accounts.filter(a => a.status === 'connected');
    if (!connected.length) {
        sel.innerHTML = '<option value="">Nenhuma conta conectada</option>';
        document.getElementById('chatList').innerHTML = '<p class="empty" style="padding:1rem;">Conecte uma conta na aba Contas primeiro.</p>';
        return;
    }
    sel.innerHTML = connected.map(a => `<option value="${a.id}">${esc(a.label)}</option>`).join('');
    if (!currentAccountId || !connected.some(a => a.id === currentAccountId)) {
        currentAccountId = connected[0].id;
    }
    sel.value = currentAccountId;
    if (!chatsInited) {
        chatsInited = true;
        chatListTimer = setInterval(refreshChatList, 15000);
    }
    await refreshChatList();
}

function onChatAccountChange() {
    currentAccountId = Number(document.getElementById('chatAccountSelect').value);
    currentChatId = null;
    refreshChatList();
}

async function refreshChatList() {
    if (!currentAccountId) return;
    const res = await fetch(API + `/api/whatsapp/accounts/${currentAccountId}/chats`);
    const data = await res.json();
    const chats = data.chats || [];
    const el = document.getElementById('chatList');
    if (!chats.length) {
        el.innerHTML = '<p class="empty" style="padding:1rem;">Nenhuma conversa ainda.</p>';
        return;
    }
    el.innerHTML = chats.map(c => `
        <div class="chat-list-item ${c.id === currentChatId ? 'active' : ''}" onclick="openChat(${c.id}, '${esc(c.display_name).replace(/'/g, "\\'")}')">
            <div class="name">${esc(c.display_name)}${c.unread_count > 0 ? `<span class="unread-badge">${c.unread_count}</span>` : ''}</div>
            <div class="preview">${esc(c.last_message_preview || '')}</div>
        </div>
    `).join('');
}

async function openChat(chatId, displayName) {
    currentChatId = chatId;
    document.getElementById('chatPanelHeader').textContent = displayName;
    await refreshChatList();
    await loadMessages();
    await fetch(API + `/api/whatsapp/chats/${chatId}/read`, { method: 'POST' });
    if (messagesTimer) clearInterval(messagesTimer);
    messagesTimer = setInterval(loadMessages, 3000);
}

async function loadMessages() {
    if (!currentChatId) return;
    const res = await fetch(API + `/api/whatsapp/chats/${currentChatId}/messages?limit=50`);
    const data = await res.json();
    const messages = data.messages || [];
    const el = document.getElementById('chatMessages');
    if (!messages.length) {
        el.innerHTML = '<div class="chat-empty">Nenhuma mensagem ainda</div>';
        return;
    }
    const wasAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 40;
    el.innerHTML = messages.map(m => `
        <div class="msg-bubble ${m.direction === 'out' ? 'msg-out' : 'msg-in'}">
            ${esc(m.body || '')}
            <span class="msg-time">${(m.sent_at || '').slice(11, 16)}</span>
        </div>
    `).join('');
    if (wasAtBottom) el.scrollTop = el.scrollHeight;
}

async function sendChatMessage() {
    if (!currentChatId) return;
    const input = document.getElementById('chatTextInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    const res = await fetch(API + `/api/whatsapp/chats/${currentChatId}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message || 'Erro ao enviar mensagem');
        return;
    }
    await loadMessages();
    await refreshChatList();
}

function openStartChatModal() {
    if (!currentAccountId) { alert('Selecione uma conta conectada primeiro.'); return; }
    document.getElementById('startChatPhone').value = '';
    document.getElementById('startChatText').value = '';
    document.getElementById('startChatModal').classList.add('active');
}

function closeStartChatModal() {
    document.getElementById('startChatModal').classList.remove('active');
}

async function submitStartChat() {
    const phone = document.getElementById('startChatPhone').value.trim();
    const text = document.getElementById('startChatText').value.trim();
    if (!phone || !text) return;
    const res = await fetch(API + `/api/whatsapp/accounts/${currentAccountId}/chats/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, text }),
    });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message || 'Erro ao iniciar conversa');
        return;
    }
    closeStartChatModal();
    await refreshChatList();
}

loadClients();
renderAccounts();
setInterval(renderAccounts, 15000);
</script>

</body>
</html>
