<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Agenda | Oráculo</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #0a1628;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 1.25rem;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 {
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 1.6rem;
    }
    .subtitle { color: #64748b; margin-bottom: 1.25rem; font-size: 0.88rem; }
    .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.1rem;
        margin-bottom: 1.1rem;
    }
    .card h2 { font-size: 1rem; color: #f8fafc; margin-bottom: 0.8rem; }
    .tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid #334155; flex-wrap: wrap; margin-bottom: 1.1rem; }
    .tab-btn {
        background: none; border: none; color: #94a3b8; font-size: 0.9rem;
        padding: 0.5rem 1rem; cursor: pointer; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .empty { color: #64748b; font-size: 0.85rem; padding: 0.5rem 0; }
    .appt-row {
        display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
        padding: 0.7rem 0; border-bottom: 1px solid #1a2744;
    }
    .appt-row:last-child { border-bottom: none; }
    .appt-info .name { font-weight: 600; color: #f8fafc; font-size: 0.92rem; }
    .appt-info .when { color: #94a3b8; font-size: 0.8rem; margin-top: 0.1rem; }
    .appt-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .status-badge {
        display: inline-block; padding: 0.15rem 0.55rem; border-radius: 10px;
        font-size: 0.72rem; font-weight: 600; margin-left: 0.4rem;
    }
    .status-confirmed { background: #1f4a2d; color: #4ade80; }
    .status-cancelled { background: #4a1f27; color: #f87171; }
    .status-completed { background: #1a2744; color: #94a3b8; }
    .status-no_show { background: #4a3a1f; color: #fbbf24; }
    .status-pending_consultant { background: #4a3a1f; color: #fbbf24; }
    .btn {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border: none; border-radius: 6px; color: #fff;
        padding: 0.45rem 0.9rem; font-size: 0.82rem; cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:disabled:hover { opacity: 0.4; }
    .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.76rem; }
    .btn-danger { background: #ef4444; }
    .btn-secondary { background: #334155; }
    .btn-block { width: 100%; margin-top: 0.5rem; }
    .form-group { margin-bottom: 0.8rem; }
    .form-group label { display: block; font-size: 0.82rem; color: #94a3b8; margin-bottom: 0.3rem; }
    .form-input {
        width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 6px;
        padding: 0.55rem 0.7rem; color: #e0e0e0; font-size: 0.88rem;
    }
    .day-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; }
    .day-row label { width: 60px; font-size: 0.82rem; color: #cbd5e1; display: flex; align-items: center; gap: 0.3rem; margin: 0; }
    .day-row input[type=time] { width: auto; flex: 1; }
    .slot-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
    .slot-btn {
        background: #0f172a; border: 1px solid #334155; border-radius: 6px;
        color: #cbd5e1; padding: 0.4rem 0.6rem; font-size: 0.8rem; cursor: pointer;
    }
    .slot-btn:hover, .slot-btn.selected { border-color: #60a5fa; color: #60a5fa; }
    .error-box { background: #2a1418; border: 1px solid #4a1f27; border-radius: 8px; padding: 1rem; color: #f87171; font-size: 0.9rem; }
    details summary { cursor: pointer; color: #94a3b8; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="wrap" id="app">
    <h1>📅 Minha Agenda</h1>
    <p class="subtitle" id="subtitle">Carregando...</p>
    <div class="tabs" id="topTabs" style="display:none;">
        <button class="tab-btn active" id="topTabAgenda" onclick="switchTab('agenda')">Agenda</button>
        <button class="tab-btn" id="topTabPacientes" onclick="switchTab('pacientes')">Pacientes</button>
        <button class="tab-btn" id="topTabConfig" onclick="switchTab('config')">Configurações</button>
    </div>
    <div id="content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const TOKEN = params.get('token');
const API = window.location.origin + '/whatsapp/api/consultant-portal/' + TOKEN;

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function fmtWhen(iso) {
    // iso vem como "YYYY-MM-DDTHH:MM" já em horário local (o backend já converteu)
    const [datePart, timePart] = iso.split('T');
    const [y, m, d] = datePart.split('-');
    const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const dt = new Date(iso);
    return `${days[dt.getDay()]} ${d}/${m} às ${timePart}`;
}

function calcAge(birthDateStr) {
    if (!birthDateStr) return null;
    const [y, m, d] = birthDateStr.split('-').map(Number);
    const today = new Date();
    let age = today.getFullYear() - y;
    if (today.getMonth() + 1 < m || (today.getMonth() + 1 === m && today.getDate() < d)) age--;
    return age;
}

function statusLabel(s) {
    return { confirmed: 'Confirmado', cancelled: 'Cancelado', completed: 'Concluído', no_show: 'Não compareceu', pending_consultant: 'Expirou sem confirmação' }[s] || s;
}

const WEEKDAYS = [['mon','Seg'], ['tue','Ter'], ['wed','Qua'], ['thu','Qui'], ['fri','Sex'], ['sat','Sáb'], ['sun','Dom']];

async function api(path, opts) {
    const res = await fetch(API + path, Object.assign({ headers: {'Content-Type':'application/json'} }, opts || {}));
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.message || 'Erro na requisição');
    return data;
}

async function init() {
    if (!TOKEN) {
        document.getElementById('subtitle').textContent = '';
        document.getElementById('content').innerHTML = `<div class="error-box">Link inválido. Peça um novo mandando "minha agenda" pelo WhatsApp.</div>`;
        return;
    }
    try {
        const me = await api('/me');
        document.getElementById('subtitle').textContent = `${me.name} · ${me.account_label}`;
        renderShell(me);
        await loadAppointments();
        loadContacts();
        loadFichaPatients();
    } catch (e) {
        document.getElementById('subtitle').textContent = '';
        document.getElementById('content').innerHTML = `<div class="error-box">${esc(e.message)}. Peça um novo link mandando "minha agenda" pelo WhatsApp.</div>`;
    }
}

function renderShell(me) {
    const availabilityCard = me.self_availability_enabled === false ? `
        <div class="card">
            <h2>Minha disponibilidade</h2>
            <p class="empty">Sua disponibilidade é definida por ${esc(me.account_label)} — fale com quem administra sua agenda pra ajustar os horários.</p>
        </div>
    ` : `
        <div class="card">
            <h2>Minha disponibilidade</h2>
            <div id="availabilityRows"></div>
            <h3 style="font-size:0.9rem; color:#f8fafc; margin:1.2rem 0 0.5rem;">Datas avulsas <span style="font-weight:normal; color:#64748b; font-size:0.78rem;">(libera um horário fora do padrão semanal, numa data específica)</span></h3>
            <div id="extraDatesRows"></div>
            <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; margin-top:0.5rem;">
                <input type="date" class="form-input" id="newExtraDate" style="flex:1; min-width:140px;">
                <input type="time" class="form-input" id="newExtraStart" value="09:00" style="width:auto;">
                <span style="color:#64748b;">–</span>
                <input type="time" class="form-input" id="newExtraEnd" value="18:00" style="width:auto;">
                <button class="btn btn-sm" onclick="addExtraDate()">+ Adicionar</button>
            </div>
            <button class="btn btn-block" style="margin-top:1.2rem;" onclick="saveAvailability()">Salvar disponibilidade</button>
        </div>
    `;
    document.getElementById('topTabs').style.display = 'flex';
    document.getElementById('content').innerHTML = `
        <div id="agenda-tab" class="tab-content active">
            <div class="card" id="pendingCard" style="display:none;">
                <h2>⏳ Aguardando sua confirmação</h2>
                <p class="empty" style="padding-top:0;">Pedidos feitos pelo cliente direto pelo WhatsApp — o cliente só sabe que está confirmado depois que você aprova aqui.</p>
                <div id="pendingList"></div>
            </div>
            <div class="card">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.8rem; flex-wrap:wrap; gap:0.5rem;">
                    <h2 style="margin:0;">Próximos horários</h2>
                    <div style="display:flex; gap:0.4rem;">
                        <button class="btn btn-sm" id="viewTabList" onclick="switchAgendaView('list')">Lista</button>
                        <button class="btn btn-sm btn-secondary" id="viewTabWeek" onclick="switchAgendaView('week')">Semana</button>
                    </div>
                </div>
                <div id="upcomingList"><p class="empty">Carregando...</p></div>
                <div id="weekView" style="display:none;"></div>
            </div>
            <div class="card" id="consultationCard" style="display:none;">
                <h2>Atendimento</h2>
                <p class="empty" id="consultationInfo" style="padding-top:0;"></p>
                <div id="consultationPatientBox"></div>
                <div class="form-group"><label>Detalhes da consulta</label><textarea class="form-input" id="consultationNotes" rows="3"></textarea></div>
                <div class="form-group"><label>Diagnóstico</label><textarea class="form-input" id="consultationDiagnosis" rows="2"></textarea></div>
                <div class="form-group"><label>Prescrição</label><textarea class="form-input" id="consultationPrescription" rows="2"></textarea></div>
                <h3 style="font-size:0.9rem; margin:0.75rem 0 0.4rem;">Sinais vitais</h3>
                <div class="form-group" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                    <div style="flex:1 1 100px;"><label>Peso (kg)</label><input type="number" step="0.1" class="form-input" id="bioWeight" oninput="updateBioImc()"></div>
                    <div style="flex:1 1 100px;"><label>Altura (cm)</label><input type="number" step="1" class="form-input" id="bioHeight" oninput="updateBioImc()"></div>
                    <div style="flex:1 1 100px;"><label>IMC</label><input class="form-input" id="bioImc" readonly></div>
                </div>
                <div class="form-group" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                    <div style="flex:1 1 100px;"><label>PA sistólica</label><input type="number" step="1" class="form-input" id="bioBpSystolic"></div>
                    <div style="flex:1 1 100px;"><label>PA diastólica</label><input type="number" step="1" class="form-input" id="bioBpDiastolic"></div>
                    <div style="flex:1 1 100px;"><label>Freq. cardíaca (bpm)</label><input type="number" step="1" class="form-input" id="bioHeartRate"></div>
                </div>
                <div class="form-group" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                    <div style="flex:1 1 100px;"><label>Glicemia (mg/dL)</label><input type="number" step="1" class="form-input" id="bioGlucose"></div>
                    <div style="flex:1 1 100px;"><label>Temperatura (°C)</label><input type="number" step="0.1" class="form-input" id="bioTemperature"></div>
                </div>
                <button class="btn btn-block" onclick="saveConsultation()">Salvar e concluir atendimento</button>
                <button class="btn btn-secondary btn-block" onclick="closeConsultation()">Cancelar</button>
            </div>
            <div class="card">
                <h2>+ Novo agendamento</h2>
                <div class="form-group">
                    <label>Cliente</label>
                    <select class="form-input" id="newContactSelect" onchange="onContactSelectChange()">
                        <option value="">+ Novo contato (digitar telefone)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Telefone do cliente (com DDI)</label>
                    <input class="form-input" id="newPhone" placeholder="5511999999999">
                </div>
                <div class="form-group"><label>Nome (opcional)</label><input class="form-input" id="newName"></div>
                <div class="form-group"><label>Assunto (opcional)</label><input class="form-input" id="newSubject" placeholder="Ex: Revisão de contrato"></div>
                <div class="form-group">
                    <label>Data e horário</label>
                    <div style="display:flex; gap:0.5rem;">
                        <input type="date" class="form-input" id="newDate">
                        <input type="time" class="form-input" id="newTime" style="flex:0.7;">
                    </div>
                </div>
                <button class="btn btn-block" onclick="createAppointmentManual()">Agendar</button>
                <details style="margin-top:0.9rem;">
                    <summary style="cursor:pointer; color:#94a3b8; font-size:0.85rem;">ou escolher a partir dos horários livres já cadastrados</summary>
                    <div id="newSlots" style="margin-top:0.6rem;"><p class="empty">Toque em "Ver horários" abaixo.</p></div>
                    <button class="btn btn-secondary btn-block" style="margin-top:0.5rem;" onclick="loadNewSlots()">Ver horários livres</button>
                </details>
            </div>
            <div class="card">
                <details>
                    <summary>Histórico recente</summary>
                    <div id="historyList" style="margin-top:0.6rem;"><p class="empty">Carregando...</p></div>
                </details>
            </div>
            <div class="card" id="rescheduleCard" style="display:none;">
                <h2>Remarcar agendamento</h2>
                <p class="empty" id="rescheduleInfo"></p>
                <div id="rescheduleSlots"></div>
                <button class="btn btn-secondary btn-block" onclick="closeReschedule()">Cancelar</button>
            </div>
        </div>
        <div id="pacientes-tab" class="tab-content">
            <div class="card">
                <h2>Ficha do paciente</h2>
                <p class="empty" style="padding-top:0;">Cadastro, agendamentos (histórico e próximos), evolução do tratamento e documentos — pacientes que você já atendeu.</p>
                <div class="form-group">
                    <label>Paciente</label>
                    <select class="form-input" id="fichaPatientSelect" onchange="loadFichaPatient()">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <div id="fichaFullBox"></div>
            </div>
        </div>
        <div id="config-tab" class="tab-content">
            <div class="card">
                <h2>Meus dados</h2>
                <div class="form-group" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                    <div style="flex:1 1 180px;"><label>CPF</label><input class="form-input" id="myCpf" placeholder="000.000.000-00" value="${esc(me.cpf || '')}"></div>
                    <div style="flex:1 1 180px;"><label>CRM</label><input class="form-input" id="myCrm" placeholder="CRM/UF 000000" value="${esc(me.crm || '')}"></div>
                </div>
                <div class="form-group"><label>Endereço</label><textarea class="form-input" id="myAddress" rows="2" placeholder="Rua, número, bairro, cidade...">${esc(me.address || '')}</textarea></div>
                <div class="form-group" style="max-width:260px;"><label>Telefone alternativo</label><input class="form-input" id="myAltPhone" placeholder="5511999999999" value="${esc(me.alt_phone || '')}"></div>
                <div class="form-group"><label>Especialidades</label><textarea class="form-input" id="mySpecialties" rows="2" placeholder="Ex: Clínica geral, Cardiologia...">${esc(me.specialties || '')}</textarea></div>
                <button class="btn btn-block" onclick="saveMyProfile()">Salvar meus dados</button>
            </div>
            ${availabilityCard}
        </div>
    `;
    if (me.self_availability_enabled !== false) {
        renderAvailabilityRows(me.weekly_availability || {});
    }
}

function switchTab(name) {
    document.querySelectorAll('#content > .tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('#topTabs > .tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(name + '-tab').classList.add('active');
    document.getElementById('topTab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

const WEEKDAY_KEY_SET = new Set(WEEKDAYS.map(([k]) => k));
let extraDates = [];

function renderAvailabilityRows(availability) {
    document.getElementById('availabilityRows').innerHTML = WEEKDAYS.map(([key, label]) => {
        const range = (availability[key] || [])[0];
        return `
        <div class="day-row">
            <label><input type="checkbox" id="avail_${key}_on" ${range ? 'checked' : ''}> ${label}</label>
            <input type="time" class="form-input" id="avail_${key}_start" value="${range ? range[0] : '09:00'}">
            <span style="color:#64748b;">–</span>
            <input type="time" class="form-input" id="avail_${key}_end" value="${range ? range[1] : '18:00'}">
        </div>`;
    }).join('');

    extraDates = [];
    Object.keys(availability).forEach(key => {
        if (WEEKDAY_KEY_SET.has(key)) return;
        (availability[key] || []).forEach(([start, end]) => extraDates.push({ date: key, start, end }));
    });
    extraDates.sort((a, b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
    renderExtraDatesRows();
}

function fmtExtraDate(iso) {
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
}

function renderExtraDatesRows() {
    document.getElementById('extraDatesRows').innerHTML = !extraDates.length
        ? '<p class="empty" style="padding:0.2rem 0;">Nenhuma data avulsa cadastrada.</p>'
        : extraDates.map((d, i) => `
            <div class="day-row">
                <span style="flex:1; font-size:0.85rem; color:#cbd5e1;">${fmtExtraDate(d.date)} · ${d.start}–${d.end}</span>
                <button class="btn btn-sm btn-danger" onclick="removeExtraDate(${i})">Remover</button>
            </div>
        `).join('');
}

function addExtraDate() {
    const date = document.getElementById('newExtraDate').value;
    const start = document.getElementById('newExtraStart').value;
    const end = document.getElementById('newExtraEnd').value;
    if (!date) return alert('Escolha uma data.');
    if (start >= end) return alert('Horário de início precisa ser antes do fim.');
    extraDates.push({ date, start, end });
    extraDates.sort((a, b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
    document.getElementById('newExtraDate').value = '';
    renderExtraDatesRows();
}

function removeExtraDate(index) {
    extraDates.splice(index, 1);
    renderExtraDatesRows();
}

async function saveAvailability() {
    const weekly_availability = {};
    WEEKDAYS.forEach(([key]) => {
        if (document.getElementById(`avail_${key}_on`).checked) {
            weekly_availability[key] = [[document.getElementById(`avail_${key}_start`).value, document.getElementById(`avail_${key}_end`).value]];
        }
    });
    extraDates.forEach(d => {
        if (!weekly_availability[d.date]) weekly_availability[d.date] = [];
        weekly_availability[d.date].push([d.start, d.end]);
    });
    try {
        await api('/availability', { method: 'PATCH', body: JSON.stringify({ weekly_availability }) });
        alert('Disponibilidade salva!');
    } catch (e) { alert(e.message); }
}

async function saveMyProfile() {
    const payload = {
        cpf: document.getElementById('myCpf').value.trim(),
        crm: document.getElementById('myCrm').value.trim(),
        address: document.getElementById('myAddress').value.trim(),
        alt_phone: document.getElementById('myAltPhone').value.trim(),
        specialties: document.getElementById('mySpecialties').value.trim(),
    };
    try {
        await api('/profile', { method: 'PATCH', body: JSON.stringify(payload) });
        alert('Seus dados foram salvos!');
    } catch (e) { alert(e.message); }
}

let lastUpcoming = [];

async function loadAppointments() {
    const data = await api('/appointments');
    lastUpcoming = [...data.pending, ...data.upcoming];

    const pendingCard = document.getElementById('pendingCard');
    const pendingEl = document.getElementById('pendingList');
    if (!data.pending.length) {
        pendingCard.style.display = 'none';
    } else {
        pendingCard.style.display = 'block';
        pendingEl.innerHTML = data.pending.map(a => `
            <div class="appt-row">
                <div class="appt-info">
                    <div class="name">${esc(a.client_name || a.client_wa_id)}</div>
                    <div class="when">${fmtWhen(a.scheduled_at)}</div>
                    ${a.subject ? `<div class="when">${esc(a.subject)}</div>` : ''}
                </div>
                <div class="appt-actions">
                    <button class="btn btn-sm" onclick="confirmAppt(${a.id})">Confirmar</button>
                    <button class="btn btn-sm btn-danger" onclick="declineAppt(${a.id})">Recusar</button>
                </div>
            </div>
        `).join('');
    }

    const up = document.getElementById('upcomingList');
    up.innerHTML = !data.upcoming.length ? '<p class="empty">Nenhum agendamento futuro.</p>' : data.upcoming.map(a => `
        <div class="appt-row">
            <div class="appt-info">
                <div class="name">${esc(a.client_name || a.client_wa_id)}</div>
                <div class="when">${fmtWhen(a.scheduled_at)}</div>
                ${a.subject ? `<div class="when">${esc(a.subject)}</div>` : ''}
            </div>
            <div class="appt-actions">
                <button class="btn btn-sm" onclick="openConsultation(${a.id}, ${a.client_contact_id}, '${esc(a.client_name || a.client_wa_id).replace(/'/g,"\\'")}', '${a.scheduled_at}')">Iniciar atendimento</button>
                <button class="btn btn-sm btn-secondary" onclick="openReschedule(${a.id}, '${esc(a.client_name || a.client_wa_id).replace(/'/g,"\\'")}')">Remarcar</button>
                <button class="btn btn-sm btn-danger" onclick="cancelAppt(${a.id})">Cancelar</button>
            </div>
        </div>
    `).join('');

    const hist = document.getElementById('historyList');
    hist.innerHTML = !data.history.length ? '<p class="empty">Sem histórico ainda.</p>' : data.history.map(a => `
        <div class="appt-row">
            <div class="appt-info">
                <div class="name">${esc(a.client_name || a.client_wa_id)} <span class="status-badge status-${a.status}">${statusLabel(a.status)}</span></div>
                <div class="when">${fmtWhen(a.scheduled_at)}</div>
                ${a.subject ? `<div class="when">${esc(a.subject)}</div>` : ''}
            </div>
        </div>
    `).join('');

    if (agendaViewMode === 'week') renderWeekView();
}

async function confirmAppt(id) {
    try {
        await api(`/appointments/${id}/confirm`, { method: 'POST' });
        loadAppointments();

let agendaViewMode = 'list';
let weekViewOffset = 0;

function switchAgendaView(mode) {
    agendaViewMode = mode;
    document.getElementById('viewTabList').className = mode === 'list' ? 'btn btn-sm' : 'btn btn-sm btn-secondary';
    document.getElementById('viewTabWeek').className = mode === 'week' ? 'btn btn-sm' : 'btn btn-sm btn-secondary';
    document.getElementById('upcomingList').style.display = mode === 'list' ? '' : 'none';
    document.getElementById('weekView').style.display = mode === 'week' ? '' : 'none';
    if (mode === 'week') renderWeekView();
}

function startOfWeek(offsetWeeks) {
    const now = new Date();
    const day = now.getDay(); // 0=Dom..6=Sáb
    const diffToMonday = (day === 0 ? -6 : 1 - day);
    return new Date(now.getFullYear(), now.getMonth(), now.getDate() + diffToMonday + offsetWeeks * 7);
}

function changeWeek(delta) {
    weekViewOffset = Math.max(0, weekViewOffset + delta);
    renderWeekView();
}

function renderWeekView() {
    const monday = startOfWeek(weekViewOffset);
    const dayNames = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];
    const todayKey = new Date().toISOString().slice(0, 10);

    const byDate = {};
    lastUpcoming.forEach(a => {
        const dateKey = a.scheduled_at.slice(0, 10);
        (byDate[dateKey] = byDate[dateKey] || []).push(a);
    });

    const cols = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const items = (byDate[key] || []).sort((a, b) => a.scheduled_at.localeCompare(b.scheduled_at));
        const isToday = key === todayKey;
        cols.push(`
            <div style="flex:1; min-width:130px; background:#0f172a; border:1px solid ${isToday ? '#60a5fa' : '#334155'}; border-radius:8px; padding:0.5rem;">
                <div style="font-size:0.78rem; color:${isToday ? '#60a5fa' : '#94a3b8'}; font-weight:600; margin-bottom:0.4rem;">${dayNames[i]} ${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}</div>
                ${items.length ? items.map(a => {
                    const isPending = a.status === 'pending_consultant';
                    const onclick = isPending
                        ? `document.getElementById('pendingCard').scrollIntoView({behavior:'smooth'})`
                        : `openReschedule(${a.id}, '${esc(a.client_name || a.client_wa_id).replace(/'/g, "\\'")}')`;
                    return `
                    <div style="font-size:0.78rem; color:${isPending ? '#fbbf24' : '#cbd5e1'}; padding:0.3rem 0; border-top:1px solid #1a2744; cursor:pointer;" onclick="${onclick}">
                        <strong>${a.scheduled_at.slice(11, 16)}</strong> ${isPending ? '⏳ ' : ''}${esc(a.client_name || a.client_wa_id)}
                        ${a.subject ? `<div style="color:#64748b;">${esc(a.subject)}</div>` : ''}
                    </div>
                `;
                }).join('') : '<div style="font-size:0.76rem; color:#475569; padding:0.3rem 0;">—</div>'}
            </div>
        `);
    }

    document.getElementById('weekView').innerHTML = `
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem;">
            <button class="btn btn-sm btn-secondary" onclick="changeWeek(-1)" ${weekViewOffset === 0 ? 'disabled' : ''}>◀ Semana anterior</button>
            <span style="font-size:0.8rem; color:#94a3b8;">${weekViewOffset === 0 ? 'Esta semana' : `Daqui ${weekViewOffset} semana(s)`}</span>
            <button class="btn btn-sm btn-secondary" onclick="changeWeek(1)">Semana seguinte ▶</button>
        </div>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">${cols.join('')}</div>
    `;
}

const BIO_FIELD_IDS = {
    weight_kg: 'bioWeight', height_cm: 'bioHeight', blood_pressure_systolic: 'bioBpSystolic',
    blood_pressure_diastolic: 'bioBpDiastolic', heart_rate_bpm: 'bioHeartRate',
    glucose_mg_dl: 'bioGlucose', temperature_c: 'bioTemperature',
};

function updateBioImc() {
    const weight = parseFloat(document.getElementById('bioWeight').value);
    const height = parseFloat(document.getElementById('bioHeight').value);
    const imcEl = document.getElementById('bioImc');
    if (weight > 0 && height > 0) {
        const heightM = height / 100;
        imcEl.value = (weight / (heightM * heightM)).toFixed(1);
    } else {
        imcEl.value = '';
    }
}

// Mesmos rótulos/unidades usados no painel da secretária (ficha do
// paciente) — duplicado aqui porque os dois portais são HTMLs estáticos
// independentes, sem módulo JS compartilhado.
const BIOMETRIC_LABELS = {
    weight_kg: { label: 'Peso', unit: 'kg', decimals: 1 },
    height_cm: { label: 'Altura', unit: 'cm', decimals: 0 },
    blood_pressure_systolic: { label: 'PA sistólica', unit: 'mmHg', decimals: 0 },
    blood_pressure_diastolic: { label: 'PA diastólica', unit: 'mmHg', decimals: 0 },
    heart_rate_bpm: { label: 'Freq. cardíaca', unit: 'bpm', decimals: 0 },
    glucose_mg_dl: { label: 'Glicemia', unit: 'mg/dL', decimals: 0 },
    temperature_c: { label: 'Temperatura', unit: '°C', decimals: 1 },
};

function bioTrendHtml(biometrics, prevBiometrics) {
    if (!biometrics) return '';
    const rows = Object.keys(BIOMETRIC_LABELS)
        .filter(type => biometrics[type] != null)
        .map(type => {
            const { label, unit, decimals } = BIOMETRIC_LABELS[type];
            const cur = Number(biometrics[type]);
            let trend = '';
            if (prevBiometrics && prevBiometrics[type] != null) {
                const prev = Number(prevBiometrics[type]);
                if (cur > prev) trend = ` <span style="color:#f87171;">↑</span> (${prev.toFixed(decimals)} antes)`;
                else if (cur < prev) trend = ` <span style="color:#4ade80;">↓</span> (${prev.toFixed(decimals)} antes)`;
                else trend = ' <span style="color:#94a3b8;">→ igual</span>';
            }
            return `<span style="margin-right:0.75rem;">${label}: ${cur.toFixed(decimals)}${unit}${trend}</span>`;
        });
    if (biometrics.weight_kg != null && biometrics.height_cm != null) {
        const heightM = Number(biometrics.height_cm) / 100;
        rows.push(`<span>IMC: ${(Number(biometrics.weight_kg) / (heightM * heightM)).toFixed(1)}</span>`);
    }
    return rows.length ? `<div style="font-size:0.8rem; color:#94a3b8; margin-top:0.15rem;">${rows.join('')}</div>` : '';
}

const BLOOD_TYPES = ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'];

            </div>
            <div class="form-group"><label>Alergias a medicamentos</label><textarea class="form-input" data-field="allergies" rows="2">${esc(record.allergies || '')}</textarea></div>
            <div class="form-group"><label>Medicações em uso hoje</label><textarea class="form-input" data-field="medications_in_use" rows="2">${esc(record.medications_in_use || '')}</textarea></div>
            <div class="form-group" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                <div style="flex:1 1 140px;">
                    <label>Sexo biológico</label>
                    <select class="form-input" data-field="biological_sex">
                        <option value="" ${sex === '' ? 'selected' : ''}>—</option>
                        <option value="male" ${sex === 'male' ? 'selected' : ''}>Masculino</option>

                </div>

async function savePatientRecord(btn) {

// Linha de agendamento completa (status, assunto, notas/diagnóstico/
// prescrição da consulta, tendência de sinais vitais) — mesmo conteúdo que
// a ficha do paciente mostra no painel da secretária, só que embutido aqui
// pra o médico não precisar sair do fluxo de atendimento pra revisar tudo.
function apptRowFull(a, prev) {
    return `
        <div style="padding:0.5rem 0; border-bottom:1px solid #1a2744;">
            <div style="font-size:0.82rem;">${fmtWhen(a.scheduled_at)}${a.consultant_name ? ' · ' + esc(a.consultant_name) : ''} <span class="status-badge status-${a.status}">${statusLabel(a.status)}</span></div>
            ${a.subject ? `<div style="font-size:0.78rem; color:#94a3b8;">${esc(a.subject)}</div>` : ''}
            ${a.notes ? `<div style="font-size:0.78rem; color:#94a3b8;"><strong>Notas:</strong> ${esc(a.notes)}</div>` : ''}
            ${a.diagnosis ? `<div style="font-size:0.78rem; color:#94a3b8;"><strong>Diagnóstico:</strong> ${esc(a.diagnosis)}</div>` : ''}
            ${a.prescription ? `<div style="font-size:0.78rem; color:#94a3b8;"><strong>Prescrição:</strong> ${esc(a.prescription)}</div>` : ''}
            ${bioTrendHtml(a.biometrics, prev && prev.biometrics)}
        </div>
    `;
}

// Monta o bloco completo (cadastro, agendamentos, evolução, documentos) a
// partir dos 4 endpoints da ficha do paciente — reaproveitado tanto durante
// o atendimento (evolução só leitura, exclui a consulta em andamento das
// listas) quanto na aba Pacientes (evolução com campo de nova nota).
function renderPatientFullBox(record, apptData, evoData, docsData, contactId, opts) {
    opts = opts || {};
    const excludeApptId = opts.excludeApptId;

    const pending = (apptData.pending || []).filter(a => a.id !== excludeApptId);
    const upcoming = (apptData.upcoming || []).filter(a => a.id !== excludeApptId);
    const history = (apptData.history || []).filter(a => a.id !== excludeApptId);

    let apptHtml = '';
    if (pending.length) apptHtml += `<h5 style="font-size:0.78rem; color:#64748b; margin:0.5rem 0 0.2rem;">Aguardando confirmação</h5>` + pending.map(a => apptRowFull(a)).join('');
    if (upcoming.length) apptHtml += `<h5 style="font-size:0.78rem; color:#64748b; margin:0.5rem 0 0.2rem;">Próximos</h5>` + upcoming.map(a => apptRowFull(a)).join('');
    // history vem do mais recente pro mais antigo — a linha anterior de cada
    // item é a próxima do array, usada pra calcular a seta de tendência
    // (↑/↓) de cada sinal vital.
    if (history.length) apptHtml += `<h5 style="font-size:0.78rem; color:#64748b; margin:0.5rem 0 0.2rem;">Histórico</h5>` + history.map((a, i) => apptRowFull(a, history[i + 1])).join('');
    if (!apptHtml) apptHtml = '<p class="empty" style="padding:0.3rem 0;">Nenhum outro agendamento.</p>';

    const notes = evoData.notes || [];
    const evoListHtml = notes.length
        ? notes.map(n => `
            <div style="padding:0.5rem 0; border-bottom:1px solid #1a2744;">
                <div style="font-size:0.75rem; color:#64748b;">${esc(n.author_label)} · ${fmtDateTime(n.created_at)}</div>
                <div style="font-size:0.82rem; white-space:pre-wrap;">${esc(n.note)}</div>
            </div>`).join('')
        : '<p class="empty" style="padding:0.3rem 0;">Nenhuma nota de evolução ainda.</p>';
    const evoHtml = opts.editableEvolution
        ? `
            <textarea class="form-input" id="fichaNewNote" rows="3" placeholder="Registrar evolução..."></textarea>
            <button class="btn btn-sm" style="margin-top:0.5rem;" onclick="addFichaEvolutionNote(${contactId})">Adicionar nota</button>
            <div style="margin-top:0.6rem;">${evoListHtml}</div>
        `
        : evoListHtml;

    const docs = docsData.documents || [];
    const docsHtml = docs.length
        ? docs.map(d => {
            const fileUrl = API + `/patient-documents/${d.id}/file`;
            return `
            <div style="padding:0.4rem 0; border-bottom:1px solid #1a2744; display:flex; justify-content:space-between; align-items:center; gap:0.5rem;">
                <div>
                    <div style="font-size:0.82rem;">${docTypeLabel(d)} ${d.original_name ? esc(d.original_name) : ''}</div>
                    <div style="font-size:0.75rem; color:#64748b;">${fmtDateTime(d.captured_at)}</div>
                    ${d.caption ? `<div style="font-size:0.78rem; color:#94a3b8;">${esc(d.caption)}</div>` : ''}
                </div>
                ${d.status === 'stored' ? `<a class="btn btn-sm" href="${fileUrl}" target="_blank">Abrir</a>` : ''}
            </div>`;
        }).join('')
        : '<p class="empty" style="padding:0.3rem 0;">Nenhum documento recebido ainda.</p>';

    return `
        <details open style="margin-bottom:0.6rem;">
            <summary>Cadastro</summary>
            <div style="margin-top:0.4rem;">${patientRecordFormHtml(record, contactId)}</div>
        </details>
        <details open style="margin-bottom:0.6rem;">
            <summary>Agendamentos (histórico completo e próximos)</summary>
            <div style="margin-top:0.4rem;">${apptHtml}</div>
        </details>
        <details style="margin-bottom:0.6rem;">
            <summary>Evolução do tratamento (${notes.length})</summary>
            <div style="margin-top:0.4rem;">${evoHtml}</div>
        </details>
        <details>
            <summary>Documentos (${docs.length})</summary>
            <div style="margin-top:0.4rem;">${docsHtml}</div>
        </details>
    `;
}

async function openConsultation(id, contactId, clientName, scheduledAt) {
    consultationApptId = id;
    document.getElementById('consultationInfo').textContent = `Paciente: ${clientName} · ${fmtWhen(scheduledAt)}`;
    document.getElementById('consultationCard').style.display = 'block';
    document.getElementById('consultationCard').scrollIntoView({ behavior: 'smooth' });
    document.getElementById('consultationNotes').value = '';
    document.getElementById('consultationDiagnosis').value = '';
    document.getElementById('consultationPrescription').value = '';
    Object.values(BIO_FIELD_IDS).forEach(elId => document.getElementById(elId).value = '');
    updateBioImc();
    loadConsultationPatientBox(id, contactId);
    try {
        const data = await api(`/appointments/${id}/consultation`);
        document.getElementById('consultationNotes').value = data.notes || '';
        document.getElementById('consultationDiagnosis').value = data.diagnosis || '';
        document.getElementById('consultationPrescription').value = data.prescription || '';
        const biometrics = data.biometrics || {};
        Object.entries(BIO_FIELD_IDS).forEach(([type, elId]) => {
            if (biometrics[type] != null) document.getElementById(elId).value = biometrics[type];
        });
        updateBioImc();
    } catch (e) { /* primeira vez — segue com os campos vazios */ }
}

function closeConsultation() {
    consultationApptId = null;
    document.getElementById('consultationCard').style.display = 'none';
    document.getElementById('consultationPatientBox').innerHTML = '';
}

async function saveConsultation() {
    const notes = document.getElementById('consultationNotes').value.trim();
    const diagnosis = document.getElementById('consultationDiagnosis').value.trim();
    const prescription = document.getElementById('consultationPrescription').value.trim();
    const biometrics = {};
    Object.entries(BIO_FIELD_IDS).forEach(([type, elId]) => {
        const raw = document.getElementById(elId).value;
        biometrics[type] = raw === '' ? null : parseFloat(raw);
    });
    try {
        await api(`/appointments/${consultationApptId}/consultation`, {
            method: 'PATCH', body: JSON.stringify({ notes, diagnosis, prescription, biometrics }),
        });
        closeConsultation();
        loadAppointments();
        alert('Atendimento registrado e consulta concluída!');
    } catch (e) { alert(e.message); }
}

async function confirmReschedule(iso) {
    try {
        await api(`/appointments/${rescheduleApptId}/reschedule`, { method: 'POST', body: JSON.stringify({ new_scheduled_at: iso }) });
        closeReschedule();
        loadAppointments();
        alert('Agendamento remarcado! O cliente foi avisado.');
    } catch (e) { alert(e.message); }
}

async function loadNewSlots() {
    const box = document.getElementById('newSlots');
    box.innerHTML = '<p class="empty">Carregando horários...</p>';
    try {
        const data = await api('/free-slots');
        box.innerHTML = !data.slots.length ? '<p class="empty">Nenhum horário livre nos próximos dias.</p>' : `<div class="slot-list">${
            data.slots.map(s => `<button class="slot-btn" onclick="createAppointment('${s}')">${fmtWhen(s.slice(0,16))}</button>`).join('')
        }</div>`;
    } catch (e) { box.innerHTML = `<p class="empty">${esc(e.message)}</p>`; }
}

async function createAppointment(iso) {
    const phone = document.getElementById('newPhone').value.trim();
    const name = document.getElementById('newName').value.trim();
    const subject = document.getElementById('newSubject').value.trim();
    if (!phone) return alert('Informe o telefone do cliente primeiro.');
    try {
        await api('/appointments', { method: 'POST', body: JSON.stringify({ phone, name, subject, scheduled_at: iso }) });
        document.getElementById('newContactSelect').value = '';
        document.getElementById('newPhone').value = '';
        document.getElementById('newPhone').readOnly = false;
        document.getElementById('newName').value = '';
        document.getElementById('newSubject').value = '';
        document.getElementById('newDate').value = '';
        document.getElementById('newTime').value = '';
        document.getElementById('newSlots').innerHTML = '<p class="empty">Toque em "Ver horários" abaixo.</p>';
        loadAppointments();
        alert('Agendamento criado! O cliente foi avisado por WhatsApp.');
    } catch (e) { alert(e.message); }
}

function createAppointmentManual() {
    // Pontual: agenda exatamente a data/horário digitado, sem depender da
    // disponibilidade cadastrada — o backend só confere conflito com outros
    // agendamentos confirmados (_create_appointment_if_free), não exige que
    // o horário esteja pré-liberado em weekly_availability.
    const date = document.getElementById('newDate').value;
    const time = document.getElementById('newTime').value;
    if (!date || !time) return alert('Escolha a data e o horário.');
    createAppointment(`${date}T${time}:00`);
}

init();
</script>
