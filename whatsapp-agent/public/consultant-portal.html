<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Agenda | Oráculo</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #0a1628;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 1.25rem;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 {
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 1.6rem;
    }
    .subtitle { color: #64748b; margin-bottom: 1.25rem; font-size: 0.88rem; }
    .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.1rem;
        margin-bottom: 1.1rem;
    }
    .card h2 { font-size: 1rem; color: #f8fafc; margin-bottom: 0.8rem; }
    .empty { color: #64748b; font-size: 0.85rem; padding: 0.5rem 0; }
    .appt-row {
        display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
        padding: 0.7rem 0; border-bottom: 1px solid #1a2744;
    }
    .appt-row:last-child { border-bottom: none; }
    .appt-info .name { font-weight: 600; color: #f8fafc; font-size: 0.92rem; }
    .appt-info .when { color: #94a3b8; font-size: 0.8rem; margin-top: 0.1rem; }
    .appt-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .status-badge {
        display: inline-block; padding: 0.15rem 0.55rem; border-radius: 10px;
        font-size: 0.72rem; font-weight: 600; margin-left: 0.4rem;
    }
    .status-confirmed { background: #1f4a2d; color: #4ade80; }
    .status-cancelled { background: #4a1f27; color: #f87171; }
    .status-completed { background: #1a2744; color: #94a3b8; }
    .status-no_show { background: #4a3a1f; color: #fbbf24; }
    .status-pending_consultant { background: #4a3a1f; color: #fbbf24; }
    .btn {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border: none; border-radius: 6px; color: #fff;
        padding: 0.45rem 0.9rem; font-size: 0.82rem; cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:disabled:hover { opacity: 0.4; }
    .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.76rem; }
    .btn-danger { background: #ef4444; }
    .btn-secondary { background: #334155; }
    .btn-block { width: 100%; margin-top: 0.5rem; }
    .form-group { margin-bottom: 0.8rem; }
    .form-group label { display: block; font-size: 0.82rem; color: #94a3b8; margin-bottom: 0.3rem; }
    .form-input {
        width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 6px;
        padding: 0.55rem 0.7rem; color: #e0e0e0; font-size: 0.88rem;
    }
    .day-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; }
    .day-row label { width: 60px; font-size: 0.82rem; color: #cbd5e1; display: flex; align-items: center; gap: 0.3rem; margin: 0; }
    .day-row input[type=time] { width: auto; flex: 1; }
    .slot-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
    .slot-btn {
        background: #0f172a; border: 1px solid #334155; border-radius: 6px;
        color: #cbd5e1; padding: 0.4rem 0.6rem; font-size: 0.8rem; cursor: pointer;
    }
    .slot-btn:hover, .slot-btn.selected { border-color: #60a5fa; color: #60a5fa; }
    .error-box { background: #2a1418; border: 1px solid #4a1f27; border-radius: 8px; padding: 1rem; color: #f87171; font-size: 0.9rem; }
    details summary { cursor: pointer; color: #94a3b8; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="wrap" id="app">
    <h1>📅 Minha Agenda</h1>
    <p class="subtitle" id="subtitle">Carregando...</p>
    <div id="content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const TOKEN = params.get('token');
const API = window.location.origin + '/api/consultant-portal/' + TOKEN;

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function fmtWhen(iso) {
    // iso vem como "YYYY-MM-DDTHH:MM" já em horário local (o backend já converteu)
    const [datePart, timePart] = iso.split('T');
    const [y, m, d] = datePart.split('-');
    const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const dt = new Date(iso);
    return `${days[dt.getDay()]} ${d}/${m} às ${timePart}`;
}

function statusLabel(s) {
    return { confirmed: 'Confirmado', cancelled: 'Cancelado', completed: 'Concluído', no_show: 'Não compareceu', pending_consultant: 'Expirou sem confirmação' }[s] || s;
}

const WEEKDAYS = [['mon','Seg'], ['tue','Ter'], ['wed','Qua'], ['thu','Qui'], ['fri','Sex'], ['sat','Sáb'], ['sun','Dom']];

async function api(path, opts) {
    const res = await fetch(API + path, Object.assign({ headers: {'Content-Type':'application/json'} }, opts || {}));
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.message || 'Erro na requisição');
    return data;
}

async function init() {
    if (!TOKEN) {
        document.getElementById('subtitle').textContent = '';
        document.getElementById('content').innerHTML = `<div class="error-box">Link inválido. Peça um novo mandando "minha agenda" pelo WhatsApp.</div>`;
        return;
    }
    try {
        const me = await api('/me');
        document.getElementById('subtitle').textContent = `${me.name} · ${me.account_label}`;
        renderShell(me);
        await loadAppointments();
        loadContacts();
    } catch (e) {
        document.getElementById('subtitle').textContent = '';
        document.getElementById('content').innerHTML = `<div class="error-box">${esc(e.message)}. Peça um novo link mandando "minha agenda" pelo WhatsApp.</div>`;
    }
}

function renderShell(me) {
    const availabilityCard = me.self_availability_enabled === false ? `
        <div class="card">
            <h2>Minha disponibilidade</h2>
            <p class="empty">Sua disponibilidade é definida por ${esc(me.account_label)} — fale com quem administra sua agenda pra ajustar os horários.</p>
        </div>
    ` : `
        <div class="card">
            <h2>Minha disponibilidade</h2>
            <div id="availabilityRows"></div>
            <h3 style="font-size:0.9rem; color:#f8fafc; margin:1.2rem 0 0.5rem;">Datas avulsas <span style="font-weight:normal; color:#64748b; font-size:0.78rem;">(libera um horário fora do padrão semanal, numa data específica)</span></h3>
            <div id="extraDatesRows"></div>
            <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; margin-top:0.5rem;">
                <input type="date" class="form-input" id="newExtraDate" style="flex:1; min-width:140px;">
                <input type="time" class="form-input" id="newExtraStart" value="09:00" style="width:auto;">
                <span style="color:#64748b;">–</span>
                <input type="time" class="form-input" id="newExtraEnd" value="18:00" style="width:auto;">
                <button class="btn btn-sm" onclick="addExtraDate()">+ Adicionar</button>
            </div>
            <button class="btn btn-block" style="margin-top:1.2rem;" onclick="saveAvailability()">Salvar disponibilidade</button>
        </div>
    `;
    document.getElementById('content').innerHTML = `
        <div class="card" id="pendingCard" style="display:none;">
            <h2>⏳ Aguardando sua confirmação</h2>
            <p class="empty" style="padding-top:0;">Pedidos feitos pelo cliente direto pelo WhatsApp — o cliente só sabe que está confirmado depois que você aprova aqui.</p>
            <div id="pendingList"></div>
        </div>
        <div class="card">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.8rem; flex-wrap:wrap; gap:0.5rem;">
                <h2 style="margin:0;">Próximos horários</h2>
                <div style="display:flex; gap:0.4rem;">
                    <button class="btn btn-sm" id="viewTabList" onclick="switchAgendaView('list')">Lista</button>
                    <button class="btn btn-sm btn-secondary" id="viewTabWeek" onclick="switchAgendaView('week')">Semana</button>
                </div>
            </div>
            <div id="upcomingList"><p class="empty">Carregando...</p></div>
            <div id="weekView" style="display:none;"></div>
        </div>
        <div class="card">
            <h2>+ Novo agendamento</h2>
            <div class="form-group">
                <label>Cliente</label>
                <select class="form-input" id="newContactSelect" onchange="onContactSelectChange()">
                    <option value="">+ Novo contato (digitar telefone)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Telefone do cliente (com DDI)</label>
                <input class="form-input" id="newPhone" placeholder="5511999999999">
            </div>
            <div class="form-group"><label>Nome (opcional)</label><input class="form-input" id="newName"></div>
            <div class="form-group"><label>Assunto (opcional)</label><input class="form-input" id="newSubject" placeholder="Ex: Revisão de contrato"></div>
            <div class="form-group">
                <label>Data e horário</label>
                <div style="display:flex; gap:0.5rem;">
                    <input type="date" class="form-input" id="newDate">
                    <input type="time" class="form-input" id="newTime" style="flex:0.7;">
                </div>
            </div>
            <button class="btn btn-block" onclick="createAppointmentManual()">Agendar</button>
            <details style="margin-top:0.9rem;">
                <summary style="cursor:pointer; color:#94a3b8; font-size:0.85rem;">ou escolher a partir dos horários livres já cadastrados</summary>
                <div id="newSlots" style="margin-top:0.6rem;"><p class="empty">Toque em "Ver horários" abaixo.</p></div>
                <button class="btn btn-secondary btn-block" style="margin-top:0.5rem;" onclick="loadNewSlots()">Ver horários livres</button>
            </details>
        </div>
        ${availabilityCard}
        <div class="card">
            <details>
                <summary>Histórico recente</summary>
                <div id="historyList" style="margin-top:0.6rem;"><p class="empty">Carregando...</p></div>
            </details>
        </div>
        <div class="card" id="rescheduleCard" style="display:none;">
            <h2>Remarcar agendamento</h2>
            <p class="empty" id="rescheduleInfo"></p>
            <div id="rescheduleSlots"></div>
            <button class="btn btn-secondary btn-block" onclick="closeReschedule()">Cancelar</button>
        </div>
    `;
    if (me.self_availability_enabled !== false) {
        renderAvailabilityRows(me.weekly_availability || {});
    }
}

const WEEKDAY_KEY_SET = new Set(WEEKDAYS.map(([k]) => k));
let extraDates = [];

function renderAvailabilityRows(availability) {
    document.getElementById('availabilityRows').innerHTML = WEEKDAYS.map(([key, label]) => {
        const range = (availability[key] || [])[0];
        return `
        <div class="day-row">
            <label><input type="checkbox" id="avail_${key}_on" ${range ? 'checked' : ''}> ${label}</label>
            <input type="time" class="form-input" id="avail_${key}_start" value="${range ? range[0] : '09:00'}">
            <span style="color:#64748b;">–</span>
            <input type="time" class="form-input" id="avail_${key}_end" value="${range ? range[1] : '18:00'}">
        </div>`;
    }).join('');

    extraDates = [];
    Object.keys(availability).forEach(key => {
        if (WEEKDAY_KEY_SET.has(key)) return;
        (availability[key] || []).forEach(([start, end]) => extraDates.push({ date: key, start, end }));
    });
    extraDates.sort((a, b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
    renderExtraDatesRows();
}

function fmtExtraDate(iso) {
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
}

function renderExtraDatesRows() {
    document.getElementById('extraDatesRows').innerHTML = !extraDates.length
        ? '<p class="empty" style="padding:0.2rem 0;">Nenhuma data avulsa cadastrada.</p>'
        : extraDates.map((d, i) => `
            <div class="day-row">
                <span style="flex:1; font-size:0.85rem; color:#cbd5e1;">${fmtExtraDate(d.date)} · ${d.start}–${d.end}</span>
                <button class="btn btn-sm btn-danger" onclick="removeExtraDate(${i})">Remover</button>
            </div>
        `).join('');
}

function addExtraDate() {
    const date = document.getElementById('newExtraDate').value;
    const start = document.getElementById('newExtraStart').value;
    const end = document.getElementById('newExtraEnd').value;
    if (!date) return alert('Escolha uma data.');
    if (start >= end) return alert('Horário de início precisa ser antes do fim.');
    extraDates.push({ date, start, end });
    extraDates.sort((a, b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
    document.getElementById('newExtraDate').value = '';
    renderExtraDatesRows();
}

function removeExtraDate(index) {
    extraDates.splice(index, 1);
    renderExtraDatesRows();
}

async function saveAvailability() {
    const weekly_availability = {};
    WEEKDAYS.forEach(([key]) => {
        if (document.getElementById(`avail_${key}_on`).checked) {
            weekly_availability[key] = [[document.getElementById(`avail_${key}_start`).value, document.getElementById(`avail_${key}_end`).value]];
        }
    });
    extraDates.forEach(d => {
        if (!weekly_availability[d.date]) weekly_availability[d.date] = [];
        weekly_availability[d.date].push([d.start, d.end]);
    });
    try {
        await api('/availability', { method: 'PATCH', body: JSON.stringify({ weekly_availability }) });
        alert('Disponibilidade salva!');
    } catch (e) { alert(e.message); }
}

let lastUpcoming = [];

async function loadAppointments() {
    const data = await api('/appointments');
    lastUpcoming = [...data.pending, ...data.upcoming];

    const pendingCard = document.getElementById('pendingCard');
    const pendingEl = document.getElementById('pendingList');
    if (!data.pending.length) {
        pendingCard.style.display = 'none';
    } else {
        pendingCard.style.display = 'block';
        pendingEl.innerHTML = data.pending.map(a => `
            <div class="appt-row">
                <div class="appt-info">
                    <div class="name">${esc(a.client_name || a.client_wa_id)}</div>
                    <div class="when">${fmtWhen(a.scheduled_at)}</div>
                    ${a.subject ? `<div class="when">${esc(a.subject)}</div>` : ''}
                </div>
                <div class="appt-actions">
                    <button class="btn btn-sm" onclick="confirmAppt(${a.id})">Confirmar</button>
                    <button class="btn btn-sm btn-danger" onclick="declineAppt(${a.id})">Recusar</button>
                </div>
            </div>
        `).join('');
    }

    const up = document.getElementById('upcomingList');
    up.innerHTML = !data.upcoming.length ? '<p class="empty">Nenhum agendamento futuro.</p>' : data.upcoming.map(a => `
        <div class="appt-row">
            <div class="appt-info">
                <div class="name">${esc(a.client_name || a.client_wa_id)}</div>
                <div class="when">${fmtWhen(a.scheduled_at)}</div>
                ${a.subject ? `<div class="when">${esc(a.subject)}</div>` : ''}
            </div>
            <div class="appt-actions">
                <button class="btn btn-sm btn-secondary" onclick="openReschedule(${a.id}, '${esc(a.client_name || a.client_wa_id).replace(/'/g,"\\'")}')">Remarcar</button>
                <button class="btn btn-sm btn-danger" onclick="cancelAppt(${a.id})">Cancelar</button>
            </div>
        </div>
    `).join('');

    const hist = document.getElementById('historyList');
    hist.innerHTML = !data.history.length ? '<p class="empty">Sem histórico ainda.</p>' : data.history.map(a => `
        <div class="appt-row">
            <div class="appt-info">
                <div class="name">${esc(a.client_name || a.client_wa_id)} <span class="status-badge status-${a.status}">${statusLabel(a.status)}</span></div>
                <div class="when">${fmtWhen(a.scheduled_at)}</div>
                ${a.subject ? `<div class="when">${esc(a.subject)}</div>` : ''}
            </div>
        </div>
    `).join('');

    if (agendaViewMode === 'week') renderWeekView();
}

async function confirmAppt(id) {
    try {
        await api(`/appointments/${id}/confirm`, { method: 'POST' });
        loadAppointments();
        alert('Agendamento confirmado! O cliente foi avisado por WhatsApp.');
    } catch (e) { alert(e.message); }
}

async function declineAppt(id) {
    if (!confirm('Recusar esse pedido de agendamento? O cliente será avisado e o horário fica livre de novo.')) return;
    try {
        await api(`/appointments/${id}/decline`, { method: 'POST' });
        loadAppointments();
    } catch (e) { alert(e.message); }
}

let agendaViewMode = 'list';
let weekViewOffset = 0;

function switchAgendaView(mode) {
    agendaViewMode = mode;
    document.getElementById('viewTabList').className = mode === 'list' ? 'btn btn-sm' : 'btn btn-sm btn-secondary';
    document.getElementById('viewTabWeek').className = mode === 'week' ? 'btn btn-sm' : 'btn btn-sm btn-secondary';
    document.getElementById('upcomingList').style.display = mode === 'list' ? '' : 'none';
    document.getElementById('weekView').style.display = mode === 'week' ? '' : 'none';
    if (mode === 'week') renderWeekView();
}

function startOfWeek(offsetWeeks) {
    const now = new Date();
    const day = now.getDay(); // 0=Dom..6=Sáb
    const diffToMonday = (day === 0 ? -6 : 1 - day);
    return new Date(now.getFullYear(), now.getMonth(), now.getDate() + diffToMonday + offsetWeeks * 7);
}

function changeWeek(delta) {
    weekViewOffset = Math.max(0, weekViewOffset + delta);
    renderWeekView();
}

function renderWeekView() {
    const monday = startOfWeek(weekViewOffset);
    const dayNames = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];
    const todayKey = new Date().toISOString().slice(0, 10);

    const byDate = {};
    lastUpcoming.forEach(a => {
        const dateKey = a.scheduled_at.slice(0, 10);
        (byDate[dateKey] = byDate[dateKey] || []).push(a);
    });

    const cols = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const items = (byDate[key] || []).sort((a, b) => a.scheduled_at.localeCompare(b.scheduled_at));
        const isToday = key === todayKey;
        cols.push(`
            <div style="flex:1; min-width:130px; background:#0f172a; border:1px solid ${isToday ? '#60a5fa' : '#334155'}; border-radius:8px; padding:0.5rem;">
                <div style="font-size:0.78rem; color:${isToday ? '#60a5fa' : '#94a3b8'}; font-weight:600; margin-bottom:0.4rem;">${dayNames[i]} ${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}</div>
                ${items.length ? items.map(a => {
                    const isPending = a.status === 'pending_consultant';
                    const onclick = isPending
                        ? `document.getElementById('pendingCard').scrollIntoView({behavior:'smooth'})`
                        : `openReschedule(${a.id}, '${esc(a.client_name || a.client_wa_id).replace(/'/g, "\\'")}')`;
                    return `
                    <div style="font-size:0.78rem; color:${isPending ? '#fbbf24' : '#cbd5e1'}; padding:0.3rem 0; border-top:1px solid #1a2744; cursor:pointer;" onclick="${onclick}">
                        <strong>${a.scheduled_at.slice(11, 16)}</strong> ${isPending ? '⏳ ' : ''}${esc(a.client_name || a.client_wa_id)}
                        ${a.subject ? `<div style="color:#64748b;">${esc(a.subject)}</div>` : ''}
                    </div>
                `;
                }).join('') : '<div style="font-size:0.76rem; color:#475569; padding:0.3rem 0;">—</div>'}
            </div>
        `);
    }

    document.getElementById('weekView').innerHTML = `
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem;">
            <button class="btn btn-sm btn-secondary" onclick="changeWeek(-1)" ${weekViewOffset === 0 ? 'disabled' : ''}>◀ Semana anterior</button>
            <span style="font-size:0.8rem; color:#94a3b8;">${weekViewOffset === 0 ? 'Esta semana' : `Daqui ${weekViewOffset} semana(s)`}</span>
            <button class="btn btn-sm btn-secondary" onclick="changeWeek(1)">Semana seguinte ▶</button>
        </div>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">${cols.join('')}</div>
    `;
}

let knownContacts = [];

async function loadContacts() {
    try {
        const data = await api('/contacts');
        knownContacts = data.contacts || [];
        document.getElementById('newContactSelect').innerHTML = '<option value="">+ Novo contato (digitar telefone)</option>' +
            knownContacts.map(c => `<option value="${esc(c.phone)}">${esc(c.name || c.phone)}</option>`).join('');
    } catch (e) { /* lista de contatos é só um auxílio — sem ela, ainda dá pra digitar o telefone */ }
}

function onContactSelectChange() {
    // select nativo em vez de <input list=datalist> — datalist não é confiável
    // em navegadores mobile/in-app (inclusive o navegador embutido do
    // WhatsApp, que é como a maioria dos consultores abre esse link).
    const phone = document.getElementById('newContactSelect').value;
    const phoneField = document.getElementById('newPhone');
    const nameField = document.getElementById('newName');
    if (!phone) {
        phoneField.value = '';
        phoneField.readOnly = false;
        nameField.value = '';
        return;
    }
    const contact = knownContacts.find(c => c.phone === phone);
    phoneField.value = phone;
    phoneField.readOnly = true;
    nameField.value = (contact && contact.name) || '';
}

async function cancelAppt(id) {
    if (!confirm('Cancelar este agendamento? O cliente será avisado por WhatsApp.')) return;
    try {
        await api(`/appointments/${id}/cancel`, { method: 'POST' });
        loadAppointments();
    } catch (e) { alert(e.message); }
}

let rescheduleApptId = null;

async function openReschedule(id, clientName) {
    rescheduleApptId = id;
    document.getElementById('rescheduleInfo').textContent = `Cliente: ${clientName}`;
    document.getElementById('rescheduleCard').style.display = 'block';
    document.getElementById('rescheduleCard').scrollIntoView({ behavior: 'smooth' });
    const box = document.getElementById('rescheduleSlots');
    box.innerHTML = '<p class="empty">Carregando horários...</p>';
    try {
        const data = await api('/free-slots');
        box.innerHTML = !data.slots.length ? '<p class="empty">Nenhum horário livre nos próximos dias.</p>' : `<div class="slot-list">${
            data.slots.map(s => `<button class="slot-btn" onclick="confirmReschedule('${s}')">${fmtWhen(s.slice(0,16))}</button>`).join('')
        }</div>`;
    } catch (e) { box.innerHTML = `<p class="empty">${esc(e.message)}</p>`; }
}

function closeReschedule() {
    rescheduleApptId = null;
    document.getElementById('rescheduleCard').style.display = 'none';
}

async function confirmReschedule(iso) {
    try {
        await api(`/appointments/${rescheduleApptId}/reschedule`, { method: 'POST', body: JSON.stringify({ new_scheduled_at: iso }) });
        closeReschedule();
        loadAppointments();
        alert('Agendamento remarcado! O cliente foi avisado.');
    } catch (e) { alert(e.message); }
}

async function loadNewSlots() {
    const box = document.getElementById('newSlots');
    box.innerHTML = '<p class="empty">Carregando horários...</p>';
    try {
        const data = await api('/free-slots');
        box.innerHTML = !data.slots.length ? '<p class="empty">Nenhum horário livre nos próximos dias.</p>' : `<div class="slot-list">${
            data.slots.map(s => `<button class="slot-btn" onclick="createAppointment('${s}')">${fmtWhen(s.slice(0,16))}</button>`).join('')
        }</div>`;
    } catch (e) { box.innerHTML = `<p class="empty">${esc(e.message)}</p>`; }
}

async function createAppointment(iso) {
    const phone = document.getElementById('newPhone').value.trim();
    const name = document.getElementById('newName').value.trim();
    const subject = document.getElementById('newSubject').value.trim();
    if (!phone) return alert('Informe o telefone do cliente primeiro.');
    try {
        await api('/appointments', { method: 'POST', body: JSON.stringify({ phone, name, subject, scheduled_at: iso }) });
        document.getElementById('newContactSelect').value = '';
        document.getElementById('newPhone').value = '';
        document.getElementById('newPhone').readOnly = false;
        document.getElementById('newName').value = '';
        document.getElementById('newSubject').value = '';
        document.getElementById('newDate').value = '';
        document.getElementById('newTime').value = '';
        document.getElementById('newSlots').innerHTML = '<p class="empty">Toque em "Ver horários" abaixo.</p>';
        loadAppointments();
        alert('Agendamento criado! O cliente foi avisado por WhatsApp.');
    } catch (e) { alert(e.message); }
}

function createAppointmentManual() {
    // Pontual: agenda exatamente a data/horário digitado, sem depender da
    // disponibilidade cadastrada — o backend só confere conflito com outros
    // agendamentos confirmados (_create_appointment_if_free), não exige que
    // o horário esteja pré-liberado em weekly_availability.
    const date = document.getElementById('newDate').value;
    const time = document.getElementById('newTime').value;
    if (!date || !time) return alert('Escolha a data e o horário.');
    createAppointment(`${date}T${time}:00`);
}

init();
</script>
