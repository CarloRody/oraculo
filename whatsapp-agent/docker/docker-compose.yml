# WAHA (WhatsApp HTTP API, baseada em WWebJS/Baileys) — único componente
# Docker do monorepo, isolado de propósito (ver Parte 12 do plano). O
# whatsapp-agent em si (Python) continua bare-metal/systemd, igual aos
# outros serviços, e fala com este container via 127.0.0.1:8080.
#
# Trocado de Evolution API para WAHA nesta primeira versão: o pull da imagem
# da Evolution API (atendai/evolution-api) estava sendo recusado pelo Docker
# Hub (limite de pull anônimo), enquanto a imagem da WAHA baixou sem problema.
#
# Uso:
#   cd whatsapp-agent/docker
#   cp .env.example .env   # e preencha WAHA_API_KEY com uma chave forte
#   docker compose up -d
services:
  waha:
    image: devlikeapro/waha:arm-2026.6.2   # tag específica arm64 — "latest" só tem build amd64
    restart: always
    ports:
      - "127.0.0.1:8080:3000"   # só localhost — nunca exposto fora da Pi
    environment:
      - WHATSAPP_API_KEY=${WAHA_API_KEY}
      - WHATSAPP_SWAGGER_CONFIG_ADVANCED=false
    volumes:
      - waha_sessions:/app/.sessions
    extra_hosts:
      - "host.docker.internal:host-gateway"   # pra WAHA conseguir chamar o webhook em :5005 no host
    mem_limit: 768m   # Orange Pi tem só 3.8GB total

volumes:
  waha_sessions:
