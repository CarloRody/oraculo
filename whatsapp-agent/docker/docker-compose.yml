# Evolution API (conector Baileys/QR Code) + Redis — único componente Docker
# do monorepo, isolado de propósito (ver Parte 12 do plano). O whatsapp-agent
# em si (Python) continua bare-metal/systemd, igual aos outros serviços, e
# fala com este container via 127.0.0.1:8080.
#
# Uso:
#   cd whatsapp-agent/docker
#   cp .env.example .env   # e preencha EVOLUTION_API_KEY com uma chave forte
#   docker compose up -d
version: "3.8"

services:
  evolution-api:
    image: atendai/evolution-api:latest
    restart: always
    ports:
      - "127.0.0.1:8080:8080"   # só localhost — nunca exposto fora da Pi
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - evolution-redis
    mem_limit: 512m   # Orange Pi tem só 3.8GB total

  evolution-redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - evolution_redis_data:/data
    mem_limit: 128m

volumes:
  evolution_instances:
  evolution_redis_data:
