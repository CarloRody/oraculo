# Configuração compartilhada do Oráculo (Tutor + Monitor Agent + Backup Manager + WhatsApp Agent).
#
# Copie este arquivo para "config.yaml" (mesma pasta) e ajuste os valores reais.
# "config.yaml" NÃO é versionado (está no .gitignore) — é onde segredos de
# verdade (api_key, password) devem morar, nunca neste arquivo de exemplo.
#
# Depois de editar config.yaml, reinicie os serviços pra aplicar:
#   systemctl restart ai-tutor-api monitor-agent backup-manager whatsapp-agent

database:
  host: /var/run/postgresql
  port: 5432          # sem uso enquanto host for um socket Unix; fica pronto para TCP+senha no futuro
  dbname: ai_tutor_db
  user: postgres
  password: null      # null = autenticação por socket Unix (peer auth), sem senha — comportamento de hoje

llm:
  provider: "LM Studio"           # rótulo informativo, não afeta o comportamento
  base_url: "http://192.168.25.8:1234/v1/chat/completions"
  model: "auto"
  api_key: null                   # null = não envia header Authorization — comportamento de hoje
  temperature: 0.7
  max_tokens: 6000
  timeout_seconds: 600

tutor:
  quota_enforcement: warn         # warn | block | off

monitor_agent:
  server:
    host: "0.0.0.0"
    port: 5003
    reload: false
  fetch_timeout: 30
  default_cron: "0 6 * * 0"
  attachments:
    max_per_page: 15        # máx. de PDFs/TXTs baixados por página monitorada
    max_bytes: 15000000     # ~15MB por anexo, protege a placa de 3.8GB
    fetch_timeout: 15        # segundos, por anexo

backup_manager:
  backup_dir: /root/backup
  schedule:
    enabled: false      # liga/desliga o backup automático agendado
    interval_hours: 24  # roda o backup completo a cada N horas
    retention_days: 14  # apaga sozinho backups mais velhos que N dias (vazio/null = nunca apaga)

ddns:
  enabled: false
  interval_minutes: 15
  hostname: null                 # ex: carlorody.jflddns.com.br
  username: null
  password: null
  update_url_template: null      # ex (palpite dyndns2): "http://ipservice.jflddns.com.br/nic/update?hostname={hostname}&myip={ip}"

whatsapp_agent:
  server:
    host: "0.0.0.0"
    port: 5005
  webhook_base_url: "http://127.0.0.1:5005"   # como a Evolution API (bare-metal, mesmo host) alcança o whatsapp-agent

evolution_api:
  base_url: "http://127.0.0.1:8090"   # Evolution API bare-metal (Node.js), ver evolution-api/ e evolution-api.service
  api_key: null                        # mesma chave usada em evolution-api/.env (AUTHENTICATION_API_KEY)
